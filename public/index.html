<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLS ↔ Immomanagement – Studio-Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap">
<style>
:root{
  --fom-primary:#00bfb3;--fom-primary-dark:#008c82;--fom-primary-light:#00d9cc;
  --fom-gradient:linear-gradient(135deg,#00d9cc 0%,#00bfb3 50%,#008c82 100%);
  --gray-50:#f5f7f9;--gray-100:#eceff2;--gray-200:#dde2e7;--gray-400:#8b92a0;
  --gray-600:#5a626d;--gray-800:#2c333b;--white:#fff;
  --green:#155724;--green-bg:#d4edda;--red:#721c24;--red-bg:#f8d7da;
  --yellow:#856404;--yellow-bg:#fff3cd;--purple:#5b2a86;--purple-bg:#efe6f7;
  --blue:#0c5460;--blue-bg:#d1ecf1;
  --radius:8px;--radius-lg:12px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,140,130,.12);
  --shadow-lg:0 8px 24px rgba(0,140,130,.18);
  --font:'Plus Jakarta Sans','Segoe UI',system-ui,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);--ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-800);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
::selection{background:rgba(0,191,179,.25);color:var(--fom-primary-dark)}
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--gray-200);border-radius:8px;border:2px solid transparent;background-clip:content-box}
*::-webkit-scrollbar-thumb:hover{background:var(--gray-400);background-clip:content-box}
:focus-visible{outline:2px solid var(--fom-primary);outline-offset:2px;border-radius:4px}
.app{display:flex;min-height:100vh}

/* Sidebar */
.sidebar{width:248px;background:var(--fom-primary);background-image:linear-gradient(180deg,#00c4b8 0%,#00bfb3 40%,#00a89d 100%);display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100;box-shadow:2px 0 16px rgba(0,140,130,.1);transition:transform .32s var(--ease-out)}
.sidebar-logo{padding:20px;border-bottom:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.08)}
.sidebar-logo h1{font-size:15px;font-weight:800;color:#fff;display:flex;align-items:center;gap:10px;letter-spacing:-.01em}
.sidebar-logo p{font-size:11px;color:rgba(255,255,255,.65);margin-top:3px}
.sidebar-nav{padding:12px 0;flex:1;overflow-y:auto}
.nav-section{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.8px;padding:12px 20px 4px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 20px;cursor:pointer;color:rgba(255,255,255,.85);font-size:13.5px;border:none;background:none;width:100%;text-align:left;transition:background .2s,color .2s;position:relative;font-family:inherit}
.nav-item:hover{background:rgba(255,255,255,.14);color:#fff}
.nav-item.active{background:rgba(255,255,255,.22);color:#fff;font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:3px;border-radius:0 3px 3px 0;background:#fff;box-shadow:0 0 8px rgba(255,255,255,.6)}
.nav-icon{font-size:15px;width:20px;text-align:center}
.sidebar-bottom{padding:14px 20px;border-top:1px solid rgba(255,255,255,.12)}
.user-chip{display:flex;align-items:center;gap:10px;cursor:pointer}
.user-avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0}
.user-name{font-size:13px;color:rgba(255,255,255,.92);font-weight:600}
.user-role{font-size:11px;color:rgba(255,255,255,.55)}

/* Main */
.main{margin-left:248px;flex:1;display:flex;flex-direction:column;min-height:100vh;transition:margin-left .3s var(--ease)}
.topbar{background:rgba(255,255,255,.85);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--gray-100);padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--shadow-sm)}
.topbar-title{font-size:17px;font-weight:800;color:var(--fom-primary);letter-spacing:-.02em}
.topbar-right{display:flex;align-items:center;gap:12px}
.menu-toggle{display:none;background:none;border:none;font-size:22px;color:var(--fom-primary);cursor:pointer;padding:6px 10px;line-height:1}
.content{padding:28px;flex:1;max-width:1400px;width:100%}
.scrim{display:none;position:fixed;inset:0;background:rgba(16,32,40,.45);z-index:90;backdrop-filter:blur(2px)}
.scrim.show{display:block}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:999px;font-size:13.5px;font-weight:600;cursor:pointer;border:none;transition:all .18s;white-space:nowrap;font-family:inherit}
.btn-primary{background:var(--fom-primary);color:#fff}
.btn-primary:hover{background:var(--fom-primary-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-secondary{background:#fff;color:var(--fom-primary);border:2px solid var(--fom-primary)}
.btn-secondary:hover{background:var(--gray-50)}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-danger:hover{background:#f5c0c0}
.btn-sm{padding:5px 13px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--gray-400);cursor:pointer;padding:4px 8px;border-radius:6px;font-size:13px;font-family:inherit}
.btn-ghost:hover{background:var(--gray-100);color:var(--gray-800)}

/* Metrics */
.metrics-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:16px;margin-bottom:24px}
.metric-card{background:#fff;border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow-sm);border:1px solid var(--gray-200);border-top:3px solid var(--fom-primary);transition:all .25s}
.metric-card:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.metric-label{font-size:11.5px;color:var(--gray-400);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.metric-value{font-size:30px;font-weight:800;color:var(--fom-primary);line-height:1}
.metric-sub{font-size:12px;color:var(--gray-400);margin-top:6px}

/* Cards */
.card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--gray-200);margin-bottom:20px;overflow:hidden}
.card-header{padding:16px 22px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.card-title{font-size:15.5px;font-weight:700;color:var(--fom-primary);letter-spacing:-.01em}
.card-body{padding:22px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}

/* Studio cards grid */
.studio-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px}
.studio-card{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-sm);border:1px solid var(--gray-200);padding:20px;cursor:pointer;transition:all .22s;border-left:4px solid var(--gray-200)}
.studio-card:hover{box-shadow:var(--shadow-md);transform:translateY(-3px)}
.studio-card.st-aktiv{border-left-color:#28a745}
.studio-card.st-in_bau{border-left-color:#ffc107}
.studio-card.st-geplant{border-left-color:#5b8def}
.studio-card.st-geschlossen{border-left-color:#dc3545}
.studio-card h3{font-size:17px;font-weight:800;color:var(--gray-800);margin-bottom:4px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.studio-card .loc{font-size:13px;color:var(--gray-600);margin-bottom:14px;display:flex;align-items:center;gap:6px}
.studio-meta{display:flex;gap:16px;font-size:12px;color:var(--gray-400);flex-wrap:wrap}
.studio-meta b{color:var(--gray-600);font-weight:600}
.studio-stats{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:999px;font-size:11.5px;font-weight:600;white-space:nowrap}
.badge::before{content:'';width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.6}
.badge-green{background:var(--green-bg);color:var(--green)}
.badge-red{background:var(--red-bg);color:var(--red)}
.badge-yellow{background:var(--yellow-bg);color:var(--yellow)}
.badge-purple{background:var(--purple-bg);color:var(--purple)}
.badge-blue{background:var(--blue-bg);color:var(--blue)}
.badge-gray{background:var(--gray-100);color:var(--gray-600)}

/* Tables */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{background:var(--fom-primary);color:#fff;padding:12px 14px;text-align:left;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
tbody td{padding:11px 14px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr{transition:background .15s}
tbody tr:hover td{background:rgba(0,191,179,.07)}

/* Infra item */
.infra-item{border:1px solid var(--gray-200);border-radius:var(--radius);padding:14px 16px;margin-bottom:12px;border-left:4px solid var(--gray-200);transition:box-shadow .2s}
.infra-item:hover{box-shadow:var(--shadow-sm)}
.infra-item.s-ok{border-left-color:#28a745}
.infra-item.s-provisorisch{border-left-color:#ffc107}
.infra-item.s-handlungsbedarf{border-left-color:#fd7e14}
.infra-item.s-kritisch{border-left-color:#dc3545}
.infra-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:6px}
.infra-head h4{font-size:14.5px;font-weight:700;color:var(--gray-800)}
.infra-desc{font-size:13.5px;color:var(--gray-600);margin-bottom:8px}
.infra-foot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--gray-400)}

/* Chat / feed */
.feed{display:flex;flex-direction:column;gap:14px;max-height:62vh;overflow-y:auto;padding-right:6px}
.msg{display:flex;gap:12px}
.msg-avatar{width:36px;height:36px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.msg.team-DLS .msg-avatar{background:linear-gradient(135deg,#5b8def,#3a6fd8)}
.msg.team-Immo .msg-avatar{background:var(--fom-gradient)}
.msg.team-IT .msg-avatar{background:linear-gradient(135deg,#9b7ad6,#6f4fb8)}
.msg.team-Medien .msg-avatar{background:linear-gradient(135deg,#ff9d6c,#f06543)}
.msg.team-Standort .msg-avatar{background:linear-gradient(135deg,#8b92a0,#5a626d)}
.msg-bubble{background:var(--gray-50);border:1px solid var(--gray-100);border-radius:12px;padding:10px 14px;flex:1}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.msg-author{font-size:13px;font-weight:700;color:var(--gray-800)}
.msg-time{font-size:11px;color:var(--gray-400)}
.msg-text{font-size:13.5px;color:var(--gray-800);white-space:pre-wrap;word-break:break-word}
.msg-clickable{cursor:pointer;border-radius:12px;transition:background .15s}
.msg-clickable:hover .msg-bubble{border-color:var(--fom-primary);box-shadow:var(--shadow-sm)}
.msg-thread-info{margin-top:7px;font-size:11.5px;font-weight:600;color:var(--fom-primary)}
.thread-root{margin-bottom:6px}
.thread-root .msg-bubble{border-left:3px solid var(--fom-primary);background:#fff}
.composer{display:flex;gap:10px;margin-top:16px;align-items:flex-end}
.composer textarea{flex:1;min-height:46px;max-height:160px;resize:vertical}

/* Forms */
.form-row{margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
label{display:block;font-size:12.5px;font-weight:600;color:var(--gray-600);margin-bottom:5px}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-size:13.5px;font-family:inherit;color:var(--gray-800);background:#fff;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--fom-primary);box-shadow:0 0 0 3px rgba(0,191,179,.12)}

/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(16,32,40,.45);z-index:200;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}.overlay.open{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:modalIn .28s var(--ease-out)}
@keyframes modalIn{from{transform:translateY(16px) scale(.98);opacity:0}to{transform:none;opacity:1}}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--gray-200);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:16px;font-weight:700;color:var(--fom-primary)}
.modal-close{background:none;border:none;font-size:22px;color:var(--gray-400);cursor:pointer;line-height:1}
.modal-close:hover{color:var(--gray-800)}
.modal-body{padding:20px 24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;gap:10px;justify-content:flex-end}
.modal.no-close .modal-close{display:none}
.login-list{display:flex;flex-direction:column;gap:6px;max-height:46vh;overflow:auto;margin-top:4px}
.login-item{display:flex;align-items:center;gap:10px;width:100%;padding:9px 12px;border:1px solid var(--gray-200);border-radius:10px;background:#fff;cursor:pointer;font-family:inherit;font-size:13.5px;transition:all .15s}
.login-item:hover{border-color:var(--fom-primary);background:var(--gray-50)}
.vg-steps{display:flex;flex-direction:column;gap:8px}
.vg-step{display:flex;align-items:flex-start;gap:8px;padding:12px 14px;border:1px solid var(--gray-200);border-radius:10px;border-left:4px solid var(--fom-primary);background:var(--cardBg,#fff)}
.vg-step.done{opacity:.62;border-left-color:#28a745}
.vg-step-num{width:24px;height:24px;border-radius:50%;background:var(--gray-100);color:var(--gray-600);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:0 0 auto;margin-top:2px}
.vg-frage{padding:12px 14px;border:1px solid var(--gray-200);border-radius:10px;background:var(--gray-50)}
.vg-frage.offen{border-left:4px solid #ffc107}
.vg-antwort{margin-top:8px;padding:8px 12px;background:#fff;border:1px solid var(--gray-200);border-radius:8px;font-size:13.5px}
/* ── Kommunikationstool ───────────────────────────────────────────────── */
.kom-channels{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.kanal-chip{display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border:1px solid var(--gray-200);border-radius:999px;background:#fff;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;color:var(--gray-700);transition:all .15s}
.kanal-chip:hover{border-color:var(--fom-primary);background:var(--gray-50)}
.kanal-chip.active{background:var(--fom-gradient);color:#fff;border-color:transparent;box-shadow:0 2px 8px rgba(0,191,179,.3)}
.kanal-count{display:inline-flex;align-items:center;justify-content:center;min-width:19px;height:19px;padding:0 5px;border-radius:999px;background:var(--gray-100);color:var(--gray-600);font-size:11px;font-weight:700}
.kanal-chip.active .kanal-count{background:rgba(255,255,255,.28);color:#fff}
.kanal-add{font-weight:700;color:var(--fom-primary-dark);border-style:dashed}
.pin-bar{background:var(--yellow-bg,#fff8e1);border:1px solid #ffe39e;border-radius:10px;padding:8px 10px;margin-bottom:12px}
.pin-bar-title{font-size:11.5px;font-weight:700;color:#9a7400;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px}
.pin-item{display:block;width:100%;text-align:left;background:none;border:none;border-radius:6px;padding:4px 6px;font-family:inherit;font-size:12.5px;color:var(--gray-700);cursor:pointer}
.pin-item:hover{background:rgba(255,227,158,.45)}
.kom-feed{max-height:none}
.msg-card .msg-bubble{flex:1;min-width:0}
.msg-card.done .msg-text{text-decoration:none;opacity:.75}
.msg-actions{display:inline-flex;gap:1px;margin-left:auto;flex-wrap:wrap}
.msg-actions .btn-ghost{padding:2px 5px;font-size:13px;line-height:1}
.msg-edited{font-size:11.5px;color:var(--gray-400);font-style:italic}
.msg-resolved{margin-top:6px;font-size:12px;color:#1a8a4a;font-weight:600}
.msg-edit textarea{width:100%;min-height:64px}
.mention{background:rgba(0,191,179,.14);color:var(--fom-primary-dark);font-weight:600;border-radius:4px;padding:0 3px}
.reaktionen{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;align-items:center}
.reaktion{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border:1px solid var(--gray-200);border-radius:999px;background:#fff;cursor:pointer;font-family:inherit;font-size:12.5px;line-height:1.6;transition:all .12s}
.reaktion:hover{border-color:var(--fom-primary)}
.reaktion.mine{background:rgba(0,191,179,.12);border-color:var(--fom-primary)}
.reaktion.add{color:var(--gray-500)}
.emoji-picker{display:inline-flex;gap:2px;padding:3px 5px;border:1px solid var(--gray-200);border-radius:999px;background:#fff;box-shadow:var(--shadow,0 2px 8px rgba(0,0,0,.08))}
.emoji-picker button{background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;border-radius:6px;line-height:1}
.emoji-picker button:hover{background:var(--gray-100)}
.anhaenge{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.anh-img{position:relative;width:120px;height:90px;border-radius:8px;overflow:hidden;border:1px solid var(--gray-200)}
.anh-img img{width:100%;height:100%;object-fit:cover;cursor:pointer;display:block}
.anh-file{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--gray-200);border-radius:8px;background:var(--gray-50);font-size:12.5px}
.anh-file a{color:var(--fom-primary-dark);text-decoration:none}
.anh-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border:none;border-radius:50%;background:rgba(0,0,0,.55);color:#fff;cursor:pointer;font-size:14px;line-height:1}
.anh-file .anh-del{position:static;width:18px;height:18px;background:var(--gray-300);color:#fff}
.kom-composer-row{display:flex;gap:8px;flex-wrap:wrap}
.kom-composer-row select{max-width:200px}
.kom-pending{display:flex;flex-wrap:wrap;gap:6px}
.kom-pend-item{display:inline-flex;align-items:center;gap:6px;padding:4px 9px;border:1px solid var(--gray-200);border-radius:999px;background:var(--gray-50);font-size:12px}
.kom-pend-item button{background:none;border:none;cursor:pointer;color:var(--gray-500);font-size:15px;line-height:1}
.msg.flash .msg-bubble{animation:flashMsg 1.4s ease}
@keyframes flashMsg{0%,40%{background:rgba(0,191,179,.16)}100%{background:transparent}}
.ad-search{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:12px;margin-bottom:14px}
.ad-search>label{display:block;font-weight:600;font-size:12.5px;margin-bottom:7px;color:var(--gray-700)}
.ad-results{margin-top:8px;display:flex;flex-direction:column;gap:4px;max-height:200px;overflow:auto}
.ad-item{display:flex;justify-content:space-between;align-items:center;gap:10px;width:100%;text-align:left;padding:7px 10px;border:1px solid var(--gray-200);border-radius:8px;background:#fff;cursor:pointer;font-family:inherit;font-size:13px}
.ad-item:hover{border-color:var(--fom-primary);background:var(--gray-50)}
.ad-hint{font-size:12.5px;color:var(--gray-500);padding:4px 2px}
@media(max-width:680px){.hide-sm{display:none}.kom-composer-row select{max-width:none;flex:1}}

/* Misc */
.page{display:none}.page.active{display:block}
.empty-state{text-align:center;padding:48px 24px;color:var(--gray-400)}
.empty-state .eicon{font-size:40px;margin-bottom:12px}
.toolbar{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;align-items:center}
.toolbar .spacer{flex:1}
.chip-filter{display:inline-flex;gap:6px;background:#fff;border:1px solid var(--gray-200);border-radius:999px;padding:4px}
.chip-filter button{border:none;background:none;padding:6px 14px;border-radius:999px;font-size:12.5px;font-weight:600;color:var(--gray-600);cursor:pointer;font-family:inherit}
.chip-filter button.active{background:var(--fom-primary);color:#fff}
.detail-row{display:flex;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:13.5px}
.detail-row:last-child{border-bottom:none}
.detail-label{width:160px;flex-shrink:0;color:var(--gray-400);font-weight:600}
.toasts{position:fixed;bottom:24px;right:24px;z-index:500;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--gray-800);color:#fff;padding:12px 18px;border-radius:var(--radius);font-size:13.5px;box-shadow:var(--shadow-md);animation:slideIn .25s ease;max-width:340px}
.toast.success{background:var(--fom-primary-dark)}.toast.error{background:#a02633}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
.section-title{font-size:13px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.6px;margin:20px 0 12px}
.placeholder-tool{text-align:center;padding:60px 24px;color:var(--gray-400)}
.placeholder-tool .eicon{font-size:48px;margin-bottom:16px}
.modal-wide{max-width:760px}

/* Fotos */
.foto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(118px,1fr));gap:12px;margin-bottom:14px}
.foto-thumb{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--gray-200);background:var(--gray-50)}
.foto-thumb img{width:100%;height:108px;object-fit:cover;cursor:zoom-in;display:block;transition:transform .25s}
.foto-thumb img:hover{transform:scale(1.05)}
.foto-cap{padding:5px 8px;font-size:11.5px;color:var(--gray-600);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.foto-del{position:absolute;top:5px;right:5px;width:22px;height:22px;border-radius:50%;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:15px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center}
.foto-del:hover{background:var(--red)}
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:400;align-items:center;justify-content:center;padding:24px;cursor:zoom-out;flex-direction:column;gap:14px}
.lightbox.open{display:flex}
.lightbox img{max-width:100%;max-height:86vh;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.lightbox .lb-cap{color:rgba(255,255,255,.85);font-size:13.5px}

@media(max-width:980px){.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.menu-toggle{display:inline-flex}.metrics-grid{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}}
@media(max-width:600px){.metrics-grid{grid-template-columns:1fr 1fr}.content{padding:16px}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="scrim" id="scrim" onclick="toggleSidebar(false)"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <h1>🏢 DLS ↔ Immo</h1>
      <p>Studio-Kommunikationsportal</p>
    </div>
    <nav class="sidebar-nav" id="nav"></nav>
    <div class="sidebar-bottom">
      <div class="user-chip" onclick="openUserModal()" title="Profil wechseln">
        <div class="user-avatar" id="userAvatar">??</div>
        <div>
          <div class="user-name" id="userName">Anmelden</div>
          <div class="user-role" id="userRole">Team wählen</div>
        </div>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title" id="topbarTitle">Dashboard</div>
      </div>
      <div class="topbar-right" id="topbarActions"></div>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="overlay" id="overlay"></div>
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightboxImg" src="" alt=""><div class="lb-cap" id="lightboxCap"></div></div>
<div class="toasts" id="toasts"></div>

<script>
// ════════════════════════════════════════════════════════════════════════════
//  STATE & API
// ════════════════════════════════════════════════════════════════════════════
const State = { studios:[], infrastruktur:[], nachrichten:[], tools:[], users:[], vorgaenge:[], kanaele:[], adEnabled:false, current:'dashboard', currentStudio:null, currentThread:null, currentMangel:null, currentVorgang:null, currentKanal:'kan_allg', editingMsg:null, reactPickerFor:null };
// Anhänge, die einer neuen Nachricht beim Senden beigefügt werden.
let komPending = [];

// Teams (Zugehörigkeit) + ob das Team Superadmin werden darf.
const TEAMS = {
  standort:{label:'Standort (Melder)', short:'Standort', superAllowed:false},
  dls:{label:'DLS-Team', short:'DLS', superAllowed:true},
  it:{label:'IT-Team', short:'IT', superAllowed:false},
  medien:{label:'Medientechnik', short:'Medien', superAllowed:false},
  immo:{label:'Immobilienmanagement', short:'Immo', superAllowed:true}
};

const Me = {
  get id(){ return localStorage.getItem('dls_uid') || ''; },
  get user(){ return State.users.find(u=>u.id===this.id) || null; },
  get name(){ const u=this.user; return u ? `${u.vorname} ${u.nachname}`.trim() : ''; },
  // Kurzlabel des Teams (wird Meldungen/Nachrichten zugeordnet, z.B. "DLS").
  get team(){ const u=this.user; return u ? (TEAMS[u.team]?.short || u.team) : ''; },
  get teamCode(){ const u=this.user; return u ? u.team : ''; },
  setId(id){ localStorage.setItem('dls_uid', id); },
  clear(){ localStorage.removeItem('dls_uid'); }
};

// Berechtigungs-Helfer (UI-Ebene; serverseitig zusätzlich abgesichert).
function isLoggedIn(){ return !!Me.user; }
function isSuperadmin(){ const u=Me.user; return !!(u && u.superadmin); }
function isMelder(){ const u=Me.user; return !!(u && u.team==='standort'); }
function canManage(){ const u=Me.user; return !!(u && u.team!=='standort'); }

async function api(path, opts={}){
  const headers = { 'Content-Type':'application/json', 'X-Acting-User': Me.id, ...(opts.headers||{}) };
  const res = await fetch('/api'+path, { ...opts, headers });
  if(!res.ok){ const e = await res.json().catch(()=>({error:res.statusText})); throw new Error(e.error||'Fehler'); }
  return res.status===204 ? null : res.json();
}
async function loadState(){
  const s = await api('/state');
  State.studios = s.studios||[]; State.infrastruktur = s.infrastruktur||[];
  State.nachrichten = s.nachrichten||[]; State.tools = s.tools||[]; State.users = s.users||[]; State.vorgaenge = s.vorgaenge||[];
  State.kanaele = s.kanaele||[]; State.adEnabled = !!s.adEnabled;
}

// ════════════════════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════════════════════
function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':String(s); return d.innerHTML; }
function fmtDT(d){ if(!d) return '—'; return new Date(d).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}); }
function fmtD(d){ if(!d) return '—'; return new Date(d).toLocaleDateString('de-DE'); }
function initials(n){ return (n||'?').split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function toast(msg,type=''){ const d=document.createElement('div'); d.className='toast '+type; d.textContent=msg; document.getElementById('toasts').appendChild(d); setTimeout(()=>d.remove(),3200); }
function toggleSidebar(force){ const sb=document.getElementById('sidebar'),sc=document.getElementById('scrim'); const open=force===undefined?!sb.classList.contains('open'):force; sb.classList.toggle('open',open); sc.classList.toggle('show',open); }

const STUDIO_STATUS = {
  geplant:{label:'Geplant',badge:'badge-blue'}, in_bau:{label:'In Bau',badge:'badge-yellow'},
  aktiv:{label:'Aktiv',badge:'badge-green'}, geschlossen:{label:'Geschlossen',badge:'badge-red'}
};
const INFRA_STATUS = {
  ok:{label:'OK',badge:'badge-green'}, provisorisch:{label:'Provisorisch',badge:'badge-yellow'},
  handlungsbedarf:{label:'Handlungsbedarf',badge:'badge-purple'}, kritisch:{label:'Kritisch',badge:'badge-red'}
};
const AUSREICHEND = {
  ja:{label:'Reicht aus',badge:'badge-green'}, ja_vorerst:{label:'Reicht vorerst',badge:'badge-yellow'},
  nein:{label:'Reicht nicht',badge:'badge-red'}
};
const BEARBEITUNG = {
  offen:{label:'Offen',badge:'badge-gray'}, in_arbeit:{label:'In Arbeit',badge:'badge-blue'},
  bestellt:{label:'Bestellt',badge:'badge-purple'}, in_lieferung:{label:'In Lieferung',badge:'badge-yellow'},
  erledigt:{label:'Erledigt',badge:'badge-green'}
};
const INFRA_KATEGORIEN = ['Klima','Zubehör Klima','Plissees','Strom','Wasser','Netzwerk','Heizung','Sicherheit','Reinigung','Mobiliar','Sonstiges'];

// ════════════════════════════════════════════════════════════════════════════
//  NAVIGATION (modular – Tools werden hier registriert)
// ════════════════════════════════════════════════════════════════════════════
const Modules = [
  { key:'dashboard', label:'Dashboard', icon:'📊', section:'Übersicht', render:renderDashboard, show:canManage },
  { key:'studios', label:'Studios', icon:'🏢', section:'Übersicht', render:renderStudios, show:canManage },
  { key:'infrastruktur', label:'Infrastruktur', icon:'🔧', section:'Übersicht', render:renderInfrastruktur, show:canManage },
  { key:'bedarf', label:'Bedarfsübersicht', icon:'📋', section:'Übersicht', render:renderBedarf, show:canManage },
  { key:'vorgaenge', label:'Vorgänge', icon:'🔄', section:'Übersicht', render:renderVorgaenge, show:canManage },
  { key:'kommunikation', label:'Kommunikation', icon:'💬', section:'Austausch', render:renderKommunikation, show:canManage },
  { key:'tools', label:'Tools verwalten', icon:'🧩', section:'Erweitern', render:renderTools, show:canManage },
  { key:'melden', label:'Mangel melden', icon:'⚠️', section:'Melden', render:renderMelden, show:isMelder },
  { key:'meine', label:'Meine Meldungen', icon:'📨', section:'Melden', render:renderMeineMeldungen, show:isMelder },
  { key:'admin', label:'Benutzerverwaltung', icon:'👥', section:'Administration', render:renderAdmin, show:isSuperadmin }
];

function visibleModules(){ return Modules.filter(m=> m.show ? m.show() : true); }
function defaultRoute(){ const v=visibleModules(); return v.length ? v[0].key : 'melden'; }

function rank(status){ return {kritisch:4,handlungsbedarf:3,provisorisch:2,ok:1}[status]||0; }

function buildNav(){
  const nav = document.getElementById('nav');
  const mods = visibleModules();
  const sections = [...new Set(mods.map(m=>m.section))];
  // Aktive Custom-Tools als eigene Nav-Einträge (nur für Team-Mitglieder).
  const customTools = canManage() ? State.tools.filter(t=>t.aktiv) : [];
  let html='';
  sections.forEach(sec=>{
    html += `<div class="nav-section">${esc(sec)}</div>`;
    mods.filter(m=>m.section===sec).forEach(m=>{
      html += navBtn(m.key, m.icon, m.label);
    });
  });
  if(customTools.length){
    html += `<div class="nav-section">Eigene Tools</div>`;
    customTools.forEach(t=> html += navBtn('tool:'+t.id, t.icon||'🧩', t.name));
  }
  nav.innerHTML = html;
}
function navBtn(key,icon,label){
  const active = State.current===key ? ' active':'';
  return `<button class="nav-item${active}" onclick="navigate('${key}')"><span class="nav-icon">${icon}</span>${esc(label)}</button>`;
}

function navigate(key){
  // Custom-Tools nur für Team-Mitglieder.
  if(key.startsWith('tool:') && !canManage()) key = defaultRoute();
  // Detailansicht des Vorgangs zurücksetzen, wenn das Modul verlassen wird.
  if(key!=='vorgaenge') State.currentVorgang=null;
  // Zugriff auf ausgeblendete Module verhindern.
  if(!key.startsWith('tool:')){
    const target = Modules.find(m=>m.key===key);
    if(!target || (target.show && !target.show())) key = defaultRoute();
  }
  State.current = key;
  buildNav();
  toggleSidebar(false);
  const content = document.getElementById('content');
  const actions = document.getElementById('topbarActions');
  actions.innerHTML='';
  if(key.startsWith('tool:')){
    const t = State.tools.find(x=>x.id===key.slice(5));
    document.getElementById('topbarTitle').textContent = t? t.name : 'Tool';
    renderCustomTool(content, t);
    return;
  }
  const mod = Modules.find(m=>m.key===key) || visibleModules()[0] || Modules[0];
  document.getElementById('topbarTitle').textContent = mod.label;
  mod.render(content, actions);
}

// ════════════════════════════════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════════════════════════════════
function renderDashboard(content){
  const s = State.studios;
  const staedte = new Set(s.map(x=>x.standort).filter(Boolean)).size;
  const offen = State.infrastruktur.filter(i=>i.status==='handlungsbedarf'||i.status==='kritisch'||i.ausreichend==='nein').length;
  const kritisch = State.infrastruktur.filter(i=>i.status==='kritisch').length;
  const bedarf = State.infrastruktur.filter(i=>i.benoetigt).length;

  const letzteNachrichten = [...State.nachrichten].sort((a,b)=>new Date(b.erstelltAm)-new Date(a.erstelltAm)).slice(0,6);
  const handlungspunkte = State.infrastruktur
    .filter(i=>i.status==='handlungsbedarf'||i.status==='kritisch'||i.ausreichend==='nein')
    .sort((a,b)=>rank(b.status)-rank(a.status)).slice(0,8);

  content.innerHTML = `
    <div class="metrics-grid">
      <div class="metric-card"><div class="metric-label">Studios</div><div class="metric-value">${s.length}</div><div class="metric-sub">${staedte} Standorte</div></div>
      <div class="metric-card"><div class="metric-label">Konkreter Bedarf</div><div class="metric-value">${bedarf}</div><div class="metric-sub">Geräte/Maßnahmen</div></div>
      <div class="metric-card"><div class="metric-label">Handlungsbedarf</div><div class="metric-value">${offen}</div><div class="metric-sub">reicht nicht aus</div></div>
      <div class="metric-card"><div class="metric-label">Kritisch</div><div class="metric-value">${kritisch}</div><div class="metric-sub">dringend</div></div>
    </div>
    <div class="grid-2">
      <div class="card">
        <div class="card-header"><span class="card-title">⚠️ Dringendste Punkte</span><button class="btn btn-secondary btn-sm" onclick="navigate('bedarf')">Bedarfsübersicht</button></div>
        <div class="card-body">${handlungspunkte.length? handlungspunkte.map(i=>{
          const st=studioById(i.studioId);
          return `<div class="infra-item s-${i.status}" style="cursor:pointer" onclick="openStudio('${i.studioId}')">
            <div class="infra-head"><h4>${esc(st?st.standort+' · '+st.name:i.titel)}</h4>${ausrBadge(i.ausreichend)}</div>
            ${i.benoetigt?`<div class="infra-desc"><b>Benötigt:</b> ${esc(i.benoetigt)}</div>`:''}
            <div class="infra-foot"><span class="badge ${(INFRA_STATUS[i.status]||{}).badge||'badge-gray'}">${(INFRA_STATUS[i.status]||{}).label||i.status}</span></div>
          </div>`;}).join('') : emptyState('Keine offenen Punkte 🎉')}</div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">💬 Letzte Meldungen</span><button class="btn btn-secondary btn-sm" onclick="navigate('kommunikation')">Zum Verlauf</button></div>
        <div class="card-body">${letzteNachrichten.length? letzteNachrichten.map(n=>{
          const st=studioById(n.studioId);
          return `<div class="msg team-${esc(n.team)}" style="margin-bottom:14px">
            <div class="msg-avatar">${initials(n.autor)}</div>
            <div class="msg-bubble"><div class="msg-meta"><span class="msg-author">${esc(n.autor)}</span><span class="badge ${n.team==='DLS'?'badge-blue':'badge-green'}">${esc(n.team)}</span>${st?`<span class="badge badge-gray">${esc(st.name)}</span>`:''}<span class="msg-time">${fmtDT(n.erstelltAm)}</span></div><div class="msg-text">${esc(n.text)}</div></div>
          </div>`;}).join('') : emptyState('Noch keine Meldungen')}</div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════════════════════════════
//  STUDIOS
// ════════════════════════════════════════════════════════════════════════════
let studioFilter='alle';
let studioSearch='';
function renderStudios(content, actions){
  actions.innerHTML = `<button class="btn btn-primary" onclick="openStudioModal()">+ Studio</button>`;
  const filters = ['alle','geplant','in_bau','aktiv','geschlossen'];
  const q = studioSearch.trim().toLowerCase();
  const list = State.studios.filter(s=>studioFilter==='alle'||s.status===studioFilter)
    .filter(s=> !q || (`${s.name} ${s.standort}`).toLowerCase().includes(q));
  const byCity={}; list.forEach(s=>{ const c=s.standort||'—'; (byCity[c]=byCity[c]||[]).push(s); });
  const cities=Object.keys(byCity).sort((a,b)=>a.localeCompare(b,'de'));
  content.innerHTML = `
    <div class="toolbar">
      <div class="chip-filter">${filters.map(f=>`<button class="${studioFilter===f?'active':''}" onclick="setStudioFilter('${f}')">${f==='alle'?'Alle':(STUDIO_STATUS[f]?.label||f)}</button>`).join('')}</div>
      <input type="search" id="studioSearch" placeholder="🔍 Studio oder Standort..." value="${esc(studioSearch)}" oninput="onStudioSearch(this.value)" style="max-width:260px">
      <div class="spacer"></div>
      <span class="badge badge-gray">${list.length} Studios · ${cities.length} Standorte</span>
    </div>
    ${cities.length? cities.map(c=>`
      <div class="section-title">📍 ${esc(c)} <span style="color:var(--gray-400)">(${byCity[c].length})</span></div>
      <div class="studio-grid">${byCity[c].sort((a,b)=>a.name.localeCompare(b.name,'de')).map(studioCard).join('')}</div>
    `).join('') : emptyState('Keine Studios in dieser Ansicht')}`;
  const si=document.getElementById('studioSearch'); if(si && q){ si.focus(); si.setSelectionRange(si.value.length,si.value.length); }
}
function onStudioSearch(v){ studioSearch=v; renderStudios(document.getElementById('content'), document.getElementById('topbarActions')); }
function setStudioFilter(f){ studioFilter=f; renderStudios(document.getElementById('content'), document.getElementById('topbarActions')); }
function studioCard(s){
  const infra = State.infrastruktur.filter(i=>i.studioId===s.id);
  const offen = infra.filter(i=>i.status==='handlungsbedarf'||i.status==='kritisch'||i.ausreichend==='nein').length;
  const prov = infra.filter(i=>i.status==='provisorisch').length;
  const krit = infra.filter(i=>i.status==='kritisch').length;
  const st = STUDIO_STATUS[s.status]||{label:s.status,badge:'badge-gray'};
  return `<div class="studio-card st-${esc(s.status)}" onclick="openStudio('${s.id}')">
    <h3>${esc(s.name)} <span class="badge ${st.badge}">${st.label}</span></h3>
    <div class="loc">📍 ${esc(s.standort||'—')}</div>
    <div class="studio-meta">
      <span><b>feste Klima:</b> ${esc(s.festeKlima||'—')}</span>
      <span><b>DLS:</b> ${esc(s.verantwortlichDls||'—')}</span>
    </div>
    <div class="studio-stats">
      ${krit?`<span class="badge badge-red">${krit} kritisch</span>`:''}
      ${prov?`<span class="badge badge-yellow">${prov} provisorisch</span>`:''}
      ${(offen-krit)>0?`<span class="badge badge-purple">${offen-krit} Handlungsbedarf</span>`:''}
      ${offen===0&&prov===0?`<span class="badge badge-green">unkritisch</span>`:''}
    </div>
  </div>`;
}

function openStudio(id){
  const s = studioById(id); if(!s) return;
  State.currentStudio = id;
  const infra = State.infrastruktur.filter(i=>i.studioId===id).sort((a,b)=>new Date(b.geaendertAm)-new Date(a.geaendertAm));
  const msgs = State.nachrichten.filter(n=>n.studioId===id && !n.parentId).sort((a,b)=>new Date(a.erstelltAm)-new Date(b.erstelltAm));
  const fotos = (s.fotos||[]).slice().sort((a,b)=>new Date(b.hochgeladenAm)-new Date(a.hochgeladenAm));
  const st = STUDIO_STATUS[s.status]||{label:s.status,badge:'badge-gray'};
  const body = `
    <div class="detail-row"><div class="detail-label">Status</div><div><span class="badge ${st.badge}">${st.label}</span></div></div>
    <div class="detail-row"><div class="detail-label">Standort</div><div>${esc(s.standort||'—')}</div></div>
    <div class="detail-row"><div class="detail-label">Feste Klimatisierung</div><div>${esc(s.festeKlima||'—')}</div></div>
    ${s.adresse?`<div class="detail-row"><div class="detail-label">Adresse</div><div>${esc(s.adresse)}</div></div>`:''}
    <div class="detail-row"><div class="detail-label">Verantwortlich Immo</div><div>${esc(s.verantwortlichImmo||'—')}</div></div>
    <div class="detail-row"><div class="detail-label">Rückmeldende Person (DLS)</div><div>${esc(s.verantwortlichDls||'—')}</div></div>
    ${s.notizen?`<div class="detail-row"><div class="detail-label">Notizen</div><div>${esc(s.notizen)}</div></div>`:''}

    <div class="section-title">📷 Fotos vom Raum (${fotos.length})</div>
    ${fotos.length?`<div class="foto-grid">${fotos.map(f=>`
      <div class="foto-thumb">
        <img src="${esc(f.datei)}" alt="${esc(f.raum||'Foto')}" onclick="openLightbox('${esc(f.datei)}','${esc((f.raum||'')+(f.hochgeladenVon?' · '+f.hochgeladenVon:''))}')">
        <div class="foto-cap" title="${esc(f.raum||'')}">${esc(f.raum||'ohne Angabe')}</div>
        <button class="foto-del" onclick="deleteFoto('${id}','${f.id}')" title="Foto löschen">×</button>
      </div>`).join('')}</div>`:'<div class="empty-state" style="padding:16px">Noch keine Fotos</div>'}
    <button class="btn btn-secondary btn-sm" onclick="pickStudioFoto('${id}')">📷 Foto hinzufügen</button>

    <div class="section-title">🔧 Infrastruktur (${infra.length})</div>
    <div>${infra.length? infra.map(infraItem).join('') : '<div class="empty-state" style="padding:20px">Noch keine Einträge</div>'}</div>
    <button class="btn btn-secondary btn-sm" onclick="openInfraModal(null,'${id}')">+ Infrastruktur erfassen</button>

    <div class="section-title">💬 Meldungen (${msgs.length})</div>

async function toggleErledigt(id,done){

async function sendMangelKom(id){

  const ta=document.getElementById('mangelKom'); const text=(ta.value||'').trim(); if(!text) return;

    await api('/infrastruktur/'+id+'/kommentare',{method:'POST',body:JSON.stringify({text,team:Me.team,autor:Me.name})});

function pickInfraFoto(id){
  if(!requireUser()) return;
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment');
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    try{
      toast('Foto wird verarbeitet…');
      const dataUrl=await resizeImage(file,1600,0.82);
      await api('/infrastruktur/'+id+'/fotos',{method:'POST',body:JSON.stringify({dataUrl,hochgeladenVon:Me.team+' – '+Me.name})});
      await loadState(); toast('Foto gespeichert','success'); openMangel(id);
    }catch(e){ toast(e.message||'Upload fehlgeschlagen','error'); }
  };
  inp.click();
}
async function deleteInfraFoto(id,fid){
  if(!confirm('Dieses Foto löschen?')) return;
  try{ await api('/infrastruktur/'+id+'/fotos/'+fid,{method:'DELETE'}); await loadState(); toast('Foto gelöscht','success'); openMangel(id); }
  catch(e){ toast(e.message,'error'); }
}

// Team-Farbe anhand des Kurzlabels (DLS/Immo/IT/Medien/Standort).
function teamColorByShort(short){
  switch((short||'').toString().toLowerCase()){
    case 'dls': return 'badge-blue';
    case 'immo': return 'badge-green';
    case 'it': return 'badge-purple';
    case 'medien': return 'badge-yellow';
    case 'standort': return 'badge-gray';
    default: return 'badge-gray';
  }
}
function msgTeamBadge(short){ return short?`<span class="badge ${teamColorByShort(short)}">${esc(short)}</span>`:''; }
function msgBubble(n,clickable){
  const replies=clickable?State.nachrichten.filter(r=>r.parentId===n.id):[];
  const info=clickable?`<div class="msg-thread-info">${replies.length?`💬 ${replies.length} Antwort${replies.length>1?'en':''}`:'↪︎ Antworten'}</div>`:'';
  return `<div class="msg team-${esc(n.team)}${clickable?' msg-clickable':''}"${clickable?` onclick="openThread('${n.id}')" title="Öffnen & antworten"`:''}>
    <div class="msg-avatar">${initials(n.autor)}</div>
    <div class="msg-bubble"><div class="msg-meta"><span class="msg-author">${esc(n.autor)}</span>${msgTeamBadge(n.team)}${n.typ==='wichtig'?'<span class="badge badge-red">Wichtig</span>':''}<span class="msg-time">${fmtDT(n.erstelltAm)}</span></div><div class="msg-text">${esc(n.text)}</div>${info}</div>

}

const QUICK_EMOJIS = ['👍','❤️','✅','🙏','👀','🎉','😮'];
const STUDIO_ALL = '__alle__';

function kanalById(id){ return State.kanaele.find(k=>k.id===id) || null; }
function aktiveKanaele(){
  const list = State.kanaele.slice();
  return list.length ? list : [{id:'kan_allg',name:'Allgemein',icon:'💬',system:true}];
}
function kanalOfMsg(n){ return n.kanalId || 'kan_allg'; }
function canEditMsg(n){ return isSuperadmin() || (!!n.autorId && n.autorId===Me.id); }

function renderKommunikation(content){
  const kanaele = aktiveKanaele();
  if(!kanalById(State.currentKanal)) State.currentKanal = kanaele[0].id;
  const kanal = kanalById(State.currentKanal) || kanaele[0];
  const roots = State.nachrichten.filter(n=>!n.parentId && kanalOfMsg(n)===kanal.id);
  const sorted = roots.slice().sort((a,b)=>new Date(a.erstelltAm)-new Date(b.erstelltAm));
  const pinned = sorted.filter(n=>n.angepinnt);
  const channelBar = kanaele.map(k=>{
    const cnt = State.nachrichten.filter(n=>!n.parentId && kanalOfMsg(n)===k.id).length;
    return `<button class="kanal-chip ${k.id===kanal.id?'active':''}" onclick="setKanal('${k.id}')" title="${esc(k.beschreibung||'')}">
      <span>${k.icon||'💬'}</span><span>${esc(k.name)}</span><span class="kanal-count">${cnt}</span>
    </button>`;
  }).join('');
  content.innerHTML = `
    <div class="kom-channels">
      ${channelBar}
      <button class="kanal-chip kanal-add" onclick="openKanalModal()" title="Kanal anlegen">＋ Kanal</button>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">${kanal.icon||'💬'} ${esc(kanal.name)}</span>
        <div style="display:flex;gap:8px;align-items:center">
          ${kanal.beschreibung?`<span style="font-size:12.5px;color:var(--gray-500)" class="hide-sm">${esc(kanal.beschreibung)}</span>`:''}
          ${!kanal.system?`<button class="btn-ghost" onclick="openKanalModal('${kanal.id}')" title="Kanal bearbeiten">✏️</button><button class="btn-ghost" onclick="deleteKanal('${kanal.id}')" title="Kanal löschen">🗑️</button>`:''}
          <span class="badge badge-gray">${sorted.length} Themen</span>
        </div>
      </div>
      <div class="card-body">
        ${pinned.length?`<div class="pin-bar"><div class="pin-bar-title">📌 Angepinnt</div>${pinned.map(n=>`<button class="pin-item" onclick="scrollToMsg('${n.id}')"><b>${esc(n.autor)}:</b> ${esc((n.text||'').slice(0,80))}${(n.text||'').length>80?'…':''}</button>`).join('')}</div>`:''}
        <div class="feed kom-feed" id="feed">${sorted.length? sorted.map(n=>msgCard(n,{thread:true})).join('') : emptyState('Noch keine Nachrichten in diesem Kanal – starte die Kommunikation!')}</div>
        ${composerHtml()}
      </div>
    </div>`;
  const feed=document.getElementById('feed'); if(feed) feed.scrollTop=feed.scrollHeight;
}
function setKanal(id){ State.currentKanal=id; State.editingMsg=null; State.reactPickerFor=null; renderKommunikation(document.getElementById('content')); }

function composerHtml(){
  const studioOpts = `<option value="">Allgemein (kein Studio)</option><option value="${STUDIO_ALL}">🏢 Alle Studios</option>`+
    State.studios.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','de')).map(s=>`<option value="${s.id}">${esc(s.standort?s.standort+' · ':'')}${esc(s.name)}</option>`).join('');
  const mentionOpts = `<option value="">@ erwähnen…</option>`+
    State.users.filter(u=>u.aktiv!==false).sort((a,b)=>userFullName(a).localeCompare(userFullName(b),'de')).map(u=>`<option value="${esc(userFullName(u))}">${esc(userFullName(u))}${TEAMS[u.team]?' · '+TEAMS[u.team].short:''}</option>`).join('');
  const pend = komPending.length?`<div class="kom-pending">${komPending.map((p,i)=>`<span class="kom-pend-item">${p.isImg?'🖼️':'📎'} ${esc(p.name)} <button onclick="komRemovePending(${i})" title="Entfernen">×</button></span>`).join('')}</div>`:'';
  return `<div class="composer kom-composer">
    <div style="display:flex;flex-direction:column;gap:8px;flex:1">
      <div class="kom-composer-row">
        <select id="komStudio" title="Studio-Bezug">${studioOpts}</select>
        <select id="komTyp" title="Wichtigkeit"><option value="info">Info</option><option value="wichtig">Wichtig</option></select>
        <select id="komMention" onchange="komInsertMention(this)" title="Person erwähnen">${mentionOpts}</select>
        <button class="btn btn-secondary btn-sm" type="button" onclick="komPickFile()" title="Bild/PDF anhängen">📎 Anhang</button>
      </div>
      ${pend}
      <textarea id="komText" placeholder="Neue Nachricht im Kanal „${esc((kanalById(State.currentKanal)||{}).name||'')}“ … (@ erwähnt Personen)"></textarea>
    </div>
    <button class="btn btn-primary" onclick="sendKom()">Senden</button>
  </div>`;
}

// Einheitliches Nachrichten-Rendering (Kanal-Feed & Thread).
function msgCard(n, opts={}){
  const st = n.studioId===STUDIO_ALL ? null : studioById(n.studioId);
  const replies = State.nachrichten.filter(r=>r.parentId===n.id);
  const editing = State.editingMsg===n.id;
  const studioBadge = n.studioId===STUDIO_ALL ? `<span class="badge badge-blue">🏢 Alle Studios</span>` : (st?`<span class="badge badge-gray">${esc(st.name)}</span>`:'');
  const badges = `${msgTeamBadge(n.team)}${studioBadge}${n.typ==='wichtig'?'<span class="badge badge-red">Wichtig</span>':''}${n.erledigt?'<span class="badge badge-green">✓ Erledigt</span>':''}${n.angepinnt?'<span class="badge badge-yellow">📌</span>':''}`;
  const edited = n.bearbeitetAm?`<span class="msg-edited" title="Bearbeitet ${fmtDT(n.bearbeitetAm)}">· bearbeitet</span>`:'';
  const textBlock = editing
    ? `<div class="msg-edit"><textarea id="editText_${n.id}">${esc(n.text)}</textarea><div style="display:flex;gap:6px;margin-top:6px"><button class="btn btn-primary btn-sm" onclick="saveEditMsg('${n.id}')">Speichern</button><button class="btn btn-secondary btn-sm" onclick="cancelEdit()">Abbrechen</button></div></div>`
    : `<div class="msg-text">${mentionize(n.text)}</div>`;
  const resolveInfo = n.erledigt&&n.erledigtVon?`<div class="msg-resolved">✓ Erledigt von ${esc(n.erledigtVon)} · ${fmtDT(n.erledigtAm)}</div>`:'';
  const actions = `<div class="msg-actions">
    ${opts.thread?`<button class="btn-ghost" onclick="openThread('${n.id}')" title="Antworten">💬 ${replies.length||''}</button>`:''}
    <button class="btn-ghost" onclick="togglePin('${n.id}',${!n.angepinnt})" title="${n.angepinnt?'Loslösen':'Anpinnen'}">📌</button>
    <button class="btn-ghost" onclick="toggleErledigtMsg('${n.id}',${!n.erledigt})" title="${n.erledigt?'Wieder öffnen':'Als erledigt markieren'}">${n.erledigt?'↩️':'✅'}</button>
    ${canEditMsg(n)?`<button class="btn-ghost" onclick="startEditMsg('${n.id}')" title="Bearbeiten">✏️</button>`:''}
    ${canEditMsg(n)?`<button class="btn-ghost" onclick="deleteMsg('${n.id}')" title="Löschen">🗑️</button>`:''}
  </div>`;
  return `<div class="msg team-${esc(n.team)} msg-card${n.erledigt?' done':''}" id="msg_${n.id}">
    <div class="msg-avatar">${initials(n.autor)}</div>
    <div class="msg-bubble">
      <div class="msg-meta"><span class="msg-author">${esc(n.autor)}</span>${badges}<span class="msg-time">${fmtDT(n.erstelltAm)}</span>${edited}${actions}</div>
      ${textBlock}
      ${attachmentsHtml(n)}
      ${resolveInfo}
      ${reactionsHtml(n)}
      ${opts.thread&&replies.length?`<button class="msg-thread-info" onclick="openThread('${n.id}')">💬 ${replies.length} Antwort${replies.length>1?'en':''} – Thread öffnen</button>`:''}
    </div>
  </div>`;
}
function mentionize(text){
  let html = esc(text||'');
  State.users.forEach(u=>{
    const name = userFullName(u); if(!name) return;
    const safe = name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    html = html.replace(new RegExp('@'+safe,'g'), `<span class="mention">@${esc(name)}</span>`);
  });
  return html;
}
function reactionsHtml(n){
  const groups={};
  (n.reaktionen||[]).forEach(r=>{ (groups[r.emoji]=groups[r.emoji]||[]).push(r); });
  const chips = Object.entries(groups).map(([emo,arr])=>{
    const mine = arr.some(r=>r.userId===Me.id);
    return `<button class="reaktion ${mine?'mine':''}" title="${esc(arr.map(r=>r.name).join(', '))}" onclick="toggleReaktion('${n.id}','${emo}')">${emo} ${arr.length}</button>`;
  }).join('');
  const picker = State.reactPickerFor===n.id
    ? `<span class="emoji-picker">${QUICK_EMOJIS.map(e=>`<button onclick="toggleReaktion('${n.id}','${e}')">${e}</button>`).join('')}</span>`
    : '';
  return `<div class="reaktionen">${chips}<button class="reaktion add" title="Reagieren" onclick="toggleReactPicker('${n.id}')">🙂﹢</button>${picker}</div>`;
}
function attachmentsHtml(n){
  const list=n.anhaenge||[]; if(!list.length) return '';
  return `<div class="anhaenge">${list.map(a=>{
    const url='/uploads/'+esc(a.datei);
    const isImg=(a.mime||'').startsWith('image/');
    const del = canEditMsg(n)?`<button class="anh-del" onclick="deleteAnhang('${n.id}','${a.id}')" title="Anhang löschen">×</button>`:'';
    return isImg
      ? `<div class="anh-img"><img src="${url}" alt="${esc(a.name)}" onclick="openLightbox('${url}','${esc(a.name)}')">${del}</div>`
      : `<div class="anh-file"><a href="${url}" target="_blank" rel="noopener">📎 ${esc(a.name)}</a>${del}</div>`;
  }).join('')}</div>`;
}

function rerenderKom(){
  const draft = document.getElementById('komText')?.value;
  if(State.current==='kommunikation'){ renderKommunikation(document.getElementById('content')); if(draft!=null){ const t=document.getElementById('komText'); if(t) t.value=draft; } }
  if(State.currentThread && document.getElementById('overlay')?.classList.contains('open')) openThread(State.currentThread);
}
function toggleReactPicker(id){ State.reactPickerFor = State.reactPickerFor===id?null:id; rerenderKom(); }
async function toggleReaktion(id,emoji){
  State.reactPickerFor=null;
  try{ await api('/nachrichten/'+id+'/reaktion',{method:'POST',body:JSON.stringify({emoji})}); await loadState(); rerenderKom(); }
  catch(e){ toast(e.message,'error'); }
}
async function togglePin(id,val){ try{ await api('/nachrichten/'+id+'/pin',{method:'POST',body:JSON.stringify({angepinnt:val})}); await loadState(); rerenderKom(); }catch(e){ toast(e.message,'error'); } }
async function toggleErledigtMsg(id,val){ try{ await api('/nachrichten/'+id+'/erledigt',{method:'POST',body:JSON.stringify({erledigt:val})}); await loadState(); toast(val?'Als erledigt markiert':'Wieder geöffnet','success'); rerenderKom(); }catch(e){ toast(e.message,'error'); } }
function startEditMsg(id){ State.editingMsg=id; rerenderKom(); setTimeout(()=>{const t=document.getElementById('editText_'+id); if(t){t.focus();t.setSelectionRange(t.value.length,t.value.length);}},30); }
function cancelEdit(){ State.editingMsg=null; rerenderKom(); }
async function saveEditMsg(id){
  const t=document.getElementById('editText_'+id); const text=(t?.value||'').trim(); if(!text) return;
  try{ await api('/nachrichten/'+id+'/text',{method:'PUT',body:JSON.stringify({text,mentions:parseMentions(text)})}); State.editingMsg=null; await loadState(); rerenderKom(); toast('Aktualisiert','success'); }
  catch(e){ toast(e.message,'error'); }
}
async function deleteMsg(id){
  if(!confirm('Diese Nachricht (inkl. Antworten) löschen?')) return;
  try{ await api('/nachrichten/'+id,{method:'DELETE'}); const wasThread=State.currentThread===id; if(wasThread){ State.currentThread=null; closeModal(); } await loadState(); rerenderKom(); toast('Gelöscht','success'); }
  catch(e){ toast(e.message,'error'); }
}
async function deleteAnhang(id,aid){
  if(!confirm('Anhang löschen?')) return;
  try{ await api('/nachrichten/'+id+'/anhaenge/'+aid,{method:'DELETE'}); await loadState(); rerenderKom(); }
  catch(e){ toast(e.message,'error'); }
}
function scrollToMsg(id){ const el=document.getElementById('msg_'+id); if(el){ el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),1500); } }

function parseMentions(text){
  const ids=[];
  State.users.forEach(u=>{ const name=userFullName(u); if(name && text.includes('@'+name)) ids.push(u.id); });
  return ids;
}
function komInsertMention(sel){
  const name=sel.value; sel.selectedIndex=0; if(!name) return;
  const ta=document.getElementById('komText'); if(!ta) return;
  const ins='@'+name+' ';
  const start=ta.selectionStart!=null?ta.selectionStart:ta.value.length;
  ta.value = ta.value.slice(0,start)+ins+ta.value.slice(start);
  ta.focus(); ta.setSelectionRange(start+ins.length,start+ins.length);
}
function komPickFile(){
  if(!requireUser()) return;
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*,application/pdf';
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    if(file.size>12*1024*1024){ toast('Datei zu groß (max 12 MB)','error'); return; }
    const isImg=file.type.startsWith('image/');
    try{
      const dataUrl = isImg ? await resizeImage(file,1600,0.82) : await fileToDataUrl(file);
      komPending.push({name:file.name,dataUrl,isImg});
      rerenderKom();
    }catch(e){ toast('Datei konnte nicht gelesen werden','error'); }
  };
  inp.click();
}
function komRemovePending(i){ komPending.splice(i,1); rerenderKom(); }
function fileToDataUrl(file){ return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); }); }

async function sendKom(){
  if(!requireUser()) return;
  const text=document.getElementById('komText').value.trim();
  if(!text && !komPending.length) return;
  const studioId=document.getElementById('komStudio').value||null;
  const typ=document.getElementById('komTyp').value;
  try{
    const msg=await api('/nachrichten',{method:'POST',body:JSON.stringify({
      text:text||'(Anhang)', studioId, typ, kanalId:State.currentKanal,
      team:Me.team, autor:Me.name, autorId:Me.id, mentions:parseMentions(text)
    })});
    for(const p of komPending){
      try{ await api('/nachrichten/'+msg.id+'/anhaenge',{method:'POST',body:JSON.stringify({name:p.name,dataUrl:p.dataUrl})}); }
      catch(e){ toast('Anhang '+p.name+': '+e.message,'error'); }
    }
    komPending=[];
    await loadState(); toast('Gesendet','success'); renderKommunikation(document.getElementById('content'));
  }catch(e){ toast(e.message,'error'); }
}

// ── Kanäle verwalten ────────────────────────────────────────────────────────
function openKanalModal(id){
  const k = id? kanalById(id) : {};
  const edit=!!id;
  const body=`
    <div class="form-grid">
      <div class="form-row"><label>Name *</label><input id="kn_name" value="${esc(k.name||'')}" placeholder="z.B. Standort Essen"></div>
      <div class="form-row"><label>Icon (Emoji)</label><input id="kn_icon" value="${esc(k.icon||'💬')}" placeholder="💬"></div>
    </div>
    <div class="form-row"><label>Beschreibung</label><input id="kn_desc" value="${esc(k.beschreibung||'')}" placeholder="Worum geht es in diesem Kanal?"></div>`;
  openModal(edit?'Kanal bearbeiten':'Neuer Kanal', body, [
    {label:'Abbrechen',cls:'btn-secondary',fn:closeModal},
    {label:edit?'Speichern':'Anlegen',cls:'btn-primary',fn:()=>saveKanal(id)}
  ]);
}
async function saveKanal(id){
  const payload={name:val('kn_name'),icon:val('kn_icon')||'💬',beschreibung:val('kn_desc')};
  if(!payload.name){ toast('Name ist erforderlich','error'); return; }
  try{
    const k = id ? await api('/kanaele/'+id,{method:'PUT',body:JSON.stringify(payload)})
                 : await api('/kanaele',{method:'POST',body:JSON.stringify(payload)});
    await loadState(); closeModal(); if(k&&k.id) State.currentKanal=k.id;
    renderKommunikation(document.getElementById('content')); toast('Gespeichert','success');
  }catch(e){ toast(e.message,'error'); }
}
async function deleteKanal(id){
  const k=kanalById(id); if(!k) return;
  if(k.system){ toast('Standard-Kanäle können nicht gelöscht werden','error'); return; }
  const count=State.nachrichten.filter(n=>kanalOfMsg(n)===id).length;
  if(!confirm(`Kanal „${k.name}" löschen?${count?` ${count} Nachricht(en) wandern nach „Allgemein".`:''}`)) return;
  try{
    const betroffen=State.nachrichten.filter(n=>n.kanalId===id);
    for(const n of betroffen){ try{ await api('/nachrichten/'+n.id,{method:'PUT',body:JSON.stringify({kanalId:'kan_allg'})}); }catch(_){} }
    await api('/kanaele/'+id,{method:'DELETE'});
    State.currentKanal='kan_allg';
    await loadState(); renderKommunikation(document.getElementById('content')); toast('Kanal gelöscht','success');
  }catch(e){ toast(e.message,'error'); }
}

// Einzelner Chat-Thread zu einer Nachricht
function openThread(msgId){
  const root=State.nachrichten.find(n=>n.id===msgId); if(!root){ closeModal(); return; }
  State.currentThread=msgId;
  const replies=State.nachrichten.filter(r=>r.parentId===msgId).sort((a,b)=>new Date(a.erstelltAm)-new Date(b.erstelltAm));
  const body=`
    <div class="thread-root">${msgCard(root,{thread:false})}</div>
    <div class="section-title">Antworten (${replies.length})</div>
    <div class="feed" id="threadFeed" style="max-height:42vh">${replies.length? replies.map(r=>msgCard(r,{thread:false})).join('') : '<div class="empty-state" style="padding:16px">Noch keine Antworten</div>'}</div>
    <div class="composer">
      <textarea id="threadText" placeholder="Antwort schreiben… (@ erwähnt Personen)"></textarea>
      <button class="btn btn-primary" onclick="sendThreadReply('${msgId}')">Antworten</button>
    </div>`;
  openModal('💬 Thread', body, [{label:'Schließen',cls:'btn-secondary',fn:()=>{State.currentThread=null;closeModal();}}], 'modal-wide');
  const tf=document.getElementById('threadFeed'); if(tf) tf.scrollTop=tf.scrollHeight;
}
async function sendThreadReply(parentId){
  if(!requireUser()) return;
  const ta=document.getElementById('threadText'); const text=(ta.value||'').trim(); if(!text) return;
  const root=State.nachrichten.find(n=>n.id===parentId);
  await api('/nachrichten',{method:'POST',body:JSON.stringify({text,parentId,studioId:root?root.studioId:null,kanalId:root?kanalOfMsg(root):State.currentKanal,typ:'info',team:Me.team,autor:Me.name,autorId:Me.id,mentions:parseMentions(text)})});
  await loadState(); toast('Antwort gesendet','success'); openThread(parentId);
  if(State.current==='kommunikation') renderKommunikation(document.getElementById('content'));
}

function renderTools(content, actions){
  actions.innerHTML = `<button class="btn btn-primary" onclick="openToolModal()">+ Tool</button>`;
  content.innerHTML = `
    <div class="card"><div class="card-body">
      <p style="color:var(--gray-600);margin-bottom:8px">Das Portal ist modular. Eigene Tools tauchen aktiviert direkt in der Seitenleiste auf. Komplexere Tools können im Code unter <b>Modules</b> in <code>public/index.html</code> bzw. als eigene API-Route ergänzt werden.</p>
    </div></div>
    <div class="studio-grid">${State.tools.length? State.tools.map(toolCard).join('') : emptyState('Noch keine eigenen Tools')}</div>`;
}
function toolCard(t){
  const all=t.eintraege||[]; const total=all.length;
  const done=all.filter(e=>teDone(t,e)).length;
  const typeLabel=t.typ==='checkliste'?'Checkliste':'Liste';
  return `<div class="studio-card" style="cursor:pointer;border-left-color:${t.aktiv?'#28a745':'var(--gray-200)'}" onclick="navigate('tool:${t.id}')">
    <h3>${t.icon||'🧩'} ${esc(t.name)} <span class="badge ${t.aktiv?'badge-green':'badge-gray'}">${t.aktiv?'Aktiv':'Inaktiv'}</span></h3>
    <div class="infra-desc">${esc(t.beschreibung||'')}</div>
    <div style="font-size:12.5px;color:var(--gray-600);margin:8px 0">${typeLabel} · ${total} Einträge${total?` · ${total-done} offen`:''}</div>
    <div class="studio-stats" onclick="event.stopPropagation()">
      <button class="btn btn-primary btn-sm" onclick="navigate('tool:${t.id}')">Öffnen</button>
      <button class="btn btn-secondary btn-sm" onclick="openToolModal('${t.id}')">Bearbeiten</button>
      <button class="btn ${t.aktiv?'btn-danger':'btn-primary'} btn-sm" onclick="toggleTool('${t.id}',${!t.aktiv})">${t.aktiv?'Deaktivieren':'Aktivieren'}</button>
      <button class="btn-ghost" onclick="deleteTool('${t.id}')">🗑️</button>
    </div>
  </div>`;
}
async function toggleTool(id,aktiv){ await api('/tools/'+id,{method:'PUT',body:JSON.stringify({aktiv})}); await loadState(); buildNav(); navigate('tools'); }
async function deleteTool(id){ if(!confirm('Tool löschen?')) return; await api('/tools/'+id,{method:'DELETE'}); await loadState(); buildNav(); navigate('tools'); toast('Gelöscht','success'); }
function renderCustomTool(content, t){
  if(!t){ content.innerHTML=emptyState('Tool nicht gefunden'); return; }
  const actions=document.getElementById('topbarActions');
  actions.innerHTML=`<button class="btn btn-primary" onclick="openToolEntryModal('${t.id}')">+ Eintrag</button>`;

  const all=t.eintraege||[];
  const total=all.length;
  const doneCount=all.filter(e=>teDone(t,e)).length;
  const openCount=total-doneCount;

  let entries=all.filter(e=>{
    const d=teDone(t,e);
    if(toolFilter==='offen') return !d;
    if(toolFilter==='erledigt') return d;
    return true;
  });
  const prioRank={hoch:3,mittel:2,niedrig:1};
  entries.sort((a,b)=>{
    const da=teDone(t,a), db_=teDone(t,b);
    if(da!==db_) return da?1:-1;
    const pr=(prioRank[b.prioritaet]||0)-(prioRank[a.prioritaet]||0);
    if(pr) return pr;
    const fa=a.faelligBis||'9999-12-31', fb=b.faelligBis||'9999-12-31';
    if(fa!==fb) return fa<fb?-1:1;
    return new Date(a.erstelltAm)-new Date(b.erstelltAm);
  });

  const pct=total?Math.round(doneCount/total*100):0;
  const progress = t.typ==='checkliste' ? `<div style="margin-top:10px;max-width:420px">
      <div style="height:8px;background:var(--gray-200);border-radius:6px;overflow:hidden"><div style="height:100%;width:${pct}%;background:#28a745"></div></div>
      <div style="font-size:12px;color:var(--gray-600);margin-top:4px">${doneCount} von ${total} erledigt (${pct}%)</div>
    </div>` : '';

  const chip=(f,label,n)=>`<button class="btn ${toolFilter===f?'btn-primary':'btn-secondary'} btn-sm" onclick="setToolFilter('${f}')">${label}${n!=null?' ('+n+')':''}</button>`;

  const head=`<div class="card"><div class="card-body">
    <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap">
      <div style="font-size:34px;line-height:1">${t.icon||'🧩'}</div>
      <div style="flex:1;min-width:200px">
        <h2 style="color:var(--fom-primary);margin:0">${esc(t.name)}</h2>
        ${t.beschreibung?`<p style="margin:4px 0 0;color:var(--gray-600)">${esc(t.beschreibung)}</p>`:''}
        ${progress}
      </div>
      <button class="btn btn-secondary btn-sm" onclick="openToolModal('${t.id}')">⚙️ Einstellungen</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;flex-wrap:wrap">
      ${chip('offen','Offen',openCount)} ${chip('erledigt','Erledigt',doneCount)} ${chip('alle','Alle',total)}
    </div>
  </div></div>`;

  const body = entries.length
    ? `<div style="display:flex;flex-direction:column;gap:10px">${entries.map(e=>teRow(t,e)).join('')}</div>`
    : emptyState(toolFilter==='offen'?'Keine offenen Einträge 🎉':'Noch keine Einträge – oben mit „+ Eintrag" anlegen');

  content.innerHTML = head + `<div style="margin-top:14px">${body}</div>`;
}

const TE_STATUS = {
  offen:{label:'Offen',badge:'badge-gray'},
  in_arbeit:{label:'In Arbeit',badge:'badge-blue'},
  erledigt:{label:'Erledigt',badge:'badge-green'}
};
const TE_PRIO = {
  hoch:{label:'Hoch',badge:'badge-red'},
  mittel:{label:'Mittel',badge:'badge-yellow'},
  niedrig:{label:'Niedrig',badge:'badge-gray'}
};
const TE_STATUS_CYCLE = ['offen','in_arbeit','erledigt'];
let toolFilter='offen';

function teDone(t,e){ return t.typ==='checkliste' ? !!e.erledigt : e.status==='erledigt'; }
function teOverdue(e,done){ if(done||!e.faelligBis) return false; return new Date(e.faelligBis+'T23:59:59') < new Date(); }
function setToolFilter(f){ toolFilter=f; rerenderTool(State.current.slice(5)); }
function rerenderTool(toolId){
  const t=State.tools.find(x=>x.id===toolId);
  if(t && State.current==='tool:'+toolId){ renderCustomTool(document.getElementById('content'), t); }
  else { buildNav(); navigate('tools'); }
}

function teRow(t,e){
  const done=teDone(t,e);
  const over=teOverdue(e,done);
  const studio = e.studioId ? studioById(e.studioId) : null;
  const meta=[];
  if(t.typ!=='checkliste'){
    const st=TE_STATUS[e.status]||TE_STATUS.offen;
    meta.push(`<span class="badge ${st.badge}">${st.label}</span>`);
    const pr=TE_PRIO[e.prioritaet]; if(pr) meta.push(`<span class="badge ${pr.badge}">Prio: ${pr.label}</span>`);
  }
  if(studio) meta.push(`<span class="badge badge-blue">🏢 ${esc(studio.standort?studio.standort+' · ':'')}${esc(studio.name)}</span>`);
  if(e.zustaendig) meta.push(`<span class="badge badge-gray">👤 ${esc(e.zustaendig)}</span>`);
  if(e.faelligBis) meta.push(`<span class="badge ${over?'badge-red':'badge-gray'}">📅 ${fmtD(e.faelligBis)}${over?' · überfällig':''}</span>`);

  const toggler = t.typ==='checkliste'
    ? `<input type="checkbox" ${done?'checked':''} onchange="toggleToolEntry('${t.id}','${e.id}',this.checked)" style="width:20px;height:20px;margin-top:2px;cursor:pointer;flex:0 0 auto">`
    : `<button class="btn-ghost" title="Status weiterschalten" onclick="cycleToolEntry('${t.id}','${e.id}')" style="font-size:18px;flex:0 0 auto;padding:0 4px">${done?'✅':e.status==='in_arbeit'?'🔵':'⚪'}</button>`;

  return `<div class="studio-card" style="cursor:default;display:flex;gap:12px;align-items:flex-start;${done?'opacity:.65;':''}border-left-color:${over?'#dc3545':done?'#28a745':'var(--fom-primary)'}">
    ${toggler}
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;${done?'text-decoration:line-through':''}">${esc(e.titel)}</div>
      ${e.notiz?`<div class="infra-desc" style="margin-top:2px">${esc(e.notiz)}</div>`:''}
      ${meta.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">${meta.join('')}</div>`:''}
    </div>
    <div style="display:flex;gap:2px;flex:0 0 auto">
      <button class="btn-ghost" title="Bearbeiten" onclick="openToolEntryModal('${t.id}','${e.id}')">✏️</button>
      <button class="btn-ghost" title="Löschen" onclick="deleteToolEntry('${t.id}','${e.id}')">🗑️</button>
    </div>
  </div>`;
}

function openToolEntryModal(toolId, eid){
  const t=State.tools.find(x=>x.id===toolId); if(!t) return;
  const e = eid ? (t.eintraege||[]).find(x=>x.id===eid)||{} : {};
  const edit=!!eid;
  const studioOpts = State.studios.slice().sort((a,b)=>(a.name||'').localeCompare(b.name||'','de'))
    .map(s=>`<option value="${s.id}"${e.studioId===s.id?' selected':''}>${esc(s.standort?s.standort+' · ':'')}${esc(s.name)}</option>`).join('');
  const detailFields = t.typ==='checkliste' ? '' : `
    <div class="form-grid">
      <div class="form-row"><label>Status</label><select id="te_status">
        ${Object.entries(TE_STATUS).map(([k,v])=>`<option value="${k}"${(e.status||'offen')===k?' selected':''}>${v.label}</option>`).join('')}
      </select></div>
      <div class="form-row"><label>Priorität</label><select id="te_prio">
        ${Object.entries(TE_PRIO).map(([k,v])=>`<option value="${k}"${(e.prioritaet||'mittel')===k?' selected':''}>${v.label}</option>`).join('')}
      </select></div>
    </div>
    <div class="form-row"><label>Zuständig</label><input id="te_zust" value="${esc(e.zustaendig||'')}" placeholder="Name / Team"></div>`;
  const body=`
    <div class="form-row"><label>Titel *</label><input id="te_titel" value="${esc(e.titel||'')}" placeholder="Was ist zu tun?"></div>
    <div class="form-row"><label>Notiz</label><textarea id="te_notiz">${esc(e.notiz||'')}</textarea></div>
    ${detailFields}
    <div class="form-grid">
      <div class="form-row"><label>Studio (optional)</label><select id="te_studio"><option value="">— keins —</option>${studioOpts}</select></div>
      <div class="form-row"><label>Fällig bis</label><input type="date" id="te_faellig" value="${esc(e.faelligBis||'')}"></div>
    </div>`;
  openModal(edit?'Eintrag bearbeiten':'Neuer Eintrag', body, [
    {label:'Abbrechen',cls:'btn-secondary',fn:closeModal},
    {label:edit?'Speichern':'Hinzufügen',cls:'btn-primary',fn:()=>saveToolEntry(toolId,eid)}
  ]);
}
async function saveToolEntry(toolId, eid){
  const t=State.tools.find(x=>x.id===toolId); if(!t) return;
  const payload={
    titel:val('te_titel'),
    notiz:val('te_notiz'),
    studioId:document.getElementById('te_studio').value||'',
    faelligBis:val('te_faellig'),
    autor:Me.name
  };
  if(t.typ!=='checkliste'){
    payload.status=document.getElementById('te_status').value;
    payload.prioritaet=document.getElementById('te_prio').value;
    payload.zustaendig=val('te_zust');
  }
  if(!payload.titel){ toast('Titel ist erforderlich','error'); return; }
  try{
    if(eid) await api('/tools/'+toolId+'/eintraege/'+eid,{method:'PUT',body:JSON.stringify(payload)});
    else await api('/tools/'+toolId+'/eintraege',{method:'POST',body:JSON.stringify(payload)});
    await loadState(); closeModal(); rerenderTool(toolId); toast('Gespeichert','success');
  }catch(err){ toast(err.message,'error'); }
}
async function toggleToolEntry(toolId, eid, done){
  try{ await api('/tools/'+toolId+'/eintraege/'+eid,{method:'PUT',body:JSON.stringify({erledigt:done})}); await loadState(); rerenderTool(toolId); }
  catch(err){ toast(err.message,'error'); }
}
async function cycleToolEntry(toolId, eid){
  const t=State.tools.find(x=>x.id===toolId); const e=(t.eintraege||[]).find(x=>x.id===eid); if(!e) return;
  const next=TE_STATUS_CYCLE[(TE_STATUS_CYCLE.indexOf(e.status)+1)%TE_STATUS_CYCLE.length];
  try{ await api('/tools/'+toolId+'/eintraege/'+eid,{method:'PUT',body:JSON.stringify({status:next})}); await loadState(); rerenderTool(toolId); }
  catch(err){ toast(err.message,'error'); }
}
async function deleteToolEntry(toolId, eid){
  if(!confirm('Eintrag löschen?')) return;
  try{ await api('/tools/'+toolId+'/eintraege/'+eid,{method:'DELETE'}); await loadState(); rerenderTool(toolId); toast('Gelöscht','success'); }
  catch(err){ toast(err.message,'error'); }
}

function openModal(title, bodyHtml, buttons=[], extraCls=''){
  const ov=document.getElementById('overlay');
  ov.innerHTML = `<div class="modal ${extraCls}">
    <div class="modal-header"><h3>${title}</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">${bodyHtml}</div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>`;
  const foot=ov.querySelector('#modalFooter');
  buttons.forEach(b=>{ const el=document.createElement('button'); el.className='btn '+(b.cls||'btn-secondary'); el.textContent=b.label; el.onclick=b.fn; foot.appendChild(el); });
  ov.classList.add('open');
}
function closeModal(){ const ov=document.getElementById('overlay'); ov.classList.remove('open'); ov.innerHTML=''; }

function teamBadge(code){
  const t=TEAMS[code]; if(!t) return `<span class="badge badge-gray">${esc(code||'—')}</span>`;
  const cls = code==='dls'?'badge-blue':code==='immo'?'badge-green':code==='standort'?'badge-yellow':'badge-purple';
  return `<span class="badge ${cls}">${esc(t.short)}</span>`;
}
function roleBadge(u){
  if(u.aktiv===false) return `<span class="badge badge-gray">Deaktiviert</span>`;
  if(u.superadmin) return `<span class="badge badge-red">Superadmin</span>`;
  if(u.team==='standort') return `<span class="badge badge-gray">Melder</span>`;
  return `<span class="badge badge-blue">Team-Mitglied</span>`;
}
function userFullName(u){ return `${u.vorname} ${u.nachname}`.trim(); }

// Anmeldung: Benutzer per Vor-/Nachname suchen und auswählen. Ohne Benutzer → Erst-Admin anlegen.
function openLoginModal(){
  const aktive = State.users.filter(u=>u.aktiv!==false);
  if(!State.users.length){
    openModal('👋 Willkommen – ersten Administrator anlegen', `
      <p style="color:var(--gray-600);margin-bottom:10px">Es ist noch kein Benutzer angelegt. Lege den ersten <b>Superadmin</b> an (nur DLS oder Immobilienmanagement).</p>
      <div class="form-grid">
        <div class="form-row"><label>Vorname *</label><input id="lo_vorname" placeholder="Vorname"></div>
        <div class="form-row"><label>Nachname *</label><input id="lo_nachname" placeholder="Nachname"></div>
      </div>
      <div class="form-row"><label>Team *</label><select id="lo_team">
        <option value="dls">DLS-Team</option>
        <option value="immo">Immobilienmanagement</option>
      </select></div>`,
      [{label:'Administrator anlegen',cls:'btn-primary',fn:createFirstAdmin}], 'no-close');
    return;
  }
  const body=`
    <div class="form-row"><label>Wer bist du? (Name suchen)</label><input id="lo_search" placeholder="Vor- oder Nachname…" oninput="renderLoginList()" autocomplete="off"></div>
    <div id="lo_list" class="login-list"></div>
    <p style="font-size:12.5px;color:var(--gray-400);margin-top:8px">${aktive.length} aktive Benutzer. Nicht dabei? Ein Superadmin kann dich anlegen.</p>`;
  openModal('🔐 Anmelden', body, isLoggedIn()?[{label:'Abbrechen',cls:'btn-secondary',fn:closeModal}]:[], isLoggedIn()?'':'no-close');
  renderLoginList();
  setTimeout(()=>document.getElementById('lo_search')?.focus(),50);
}
function renderLoginList(){
  const box=document.getElementById('lo_list'); if(!box) return;
  const q=(document.getElementById('lo_search')?.value||'').trim().toLowerCase();
  let list=State.users.filter(u=>u.aktiv!==false);
  if(q) list=list.filter(u=>userFullName(u).toLowerCase().includes(q) || (TEAMS[u.team]?.short||'').toLowerCase().includes(q));
  list.sort((a,b)=>userFullName(a).localeCompare(userFullName(b),'de'));
  box.innerHTML = list.length ? list.slice(0,40).map(u=>`
    <button class="login-item" onclick="doLogin('${u.id}')">
      <span class="user-avatar" style="width:30px;height:30px;font-size:12px">${initials(userFullName(u))}</span>
      <span style="flex:1;text-align:left"><span style="font-weight:600">${esc(userFullName(u))}</span></span>
      ${teamBadge(u.team)} ${u.superadmin?'<span class="badge badge-red">Superadmin</span>':''}
    </button>`).join('') : `<div class="empty-state" style="padding:18px">Kein Benutzer gefunden</div>`;
}
async function doLogin(id){
  Me.setId(id);
  closeModal();
  try{ await loadState(); }catch(e){}
  applyUser(); buildNav(); navigate(defaultRoute());
  toast('Angemeldet als '+Me.name,'success');
}
async function createFirstAdmin(){
  const vorname=val('lo_vorname'), nachname=val('lo_nachname'), team=document.getElementById('lo_team').value;
  if(!vorname||!nachname){ toast('Vor- und Nachname erforderlich','error'); return; }
  try{
    const u=await api('/users',{method:'POST',body:JSON.stringify({vorname,nachname,team,superadmin:true})});
    await loadState(); Me.setId(u.id); closeModal(); applyUser(); buildNav(); navigate(defaultRoute());
    toast('Administrator angelegt','success');
  }catch(e){ toast(e.message,'error'); }
}
function logout(){ Me.clear(); applyUser(); buildNav(); openLoginModal(); }

// Profil-Chip in der Sidebar.
function openUserModal(){
  if(!isLoggedIn()){ openLoginModal(); return; }
  const u=Me.user;
  const body=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="user-avatar" style="width:48px;height:48px;font-size:17px;background:var(--fom-gradient)">${initials(Me.name)}</div>
      <div><div style="font-weight:700;font-size:15px">${esc(Me.name)}</div>

  const btns=[{label:'Benutzer wechseln',cls:'btn-secondary',fn:()=>{closeModal();openLoginModal();}},
    {label:'Abmelden',cls:'btn-danger',fn:()=>{closeModal();logout();}}];

  openModal('Profil', body, btns);
