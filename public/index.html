function applyUser(){
  const u=Me.user;
  document.getElementById('userName').textContent = u ? Me.name : 'Anmelden';
  document.getElementById('userRole').textContent = u ? (TEAMS[u.team]?.label || u.team) + (u.superadmin?' · Superadmin':'') : 'Bitte anmelden';

function requireUser(){ if(!isLoggedIn()){ openLoginModal(); toast('Bitte zuerst anmelden','error'); return false; } return true; }

// ── Benutzerverwaltung (nur Superadmin) ─────────────────────────────────────
let adminSearch='';
function renderAdmin(content, actions){
  if(!isSuperadmin()){ content.innerHTML=emptyState('Kein Zugriff'); return; }
  actions.innerHTML = `<button class="btn btn-primary" onclick="openUserEditModal()">+ Benutzer</button>`;
  const q=adminSearch.trim().toLowerCase();
  let users=State.users.slice();
  if(q) users=users.filter(u=>userFullName(u).toLowerCase().includes(q) || (TEAMS[u.team]?.short||'').toLowerCase().includes(q));
  users.sort((a,b)=>userFullName(a).localeCompare(userFullName(b),'de'));
  const rows = users.map(u=>`
    <tr>
      <td><div style="display:flex;align-items:center;gap:9px"><span class="user-avatar" style="width:30px;height:30px;font-size:12px;background:var(--fom-gradient)">${initials(userFullName(u))}</span><b>${esc(userFullName(u))}</b></div></td>
      <td>${teamBadge(u.team)}</td>
      <td>${roleBadge(u)}</td>
      <td style="text-align:right;white-space:nowrap">

        <input id="us_adsearch" placeholder="Vor-/Nachname oder vorname.nachname…" onkeydown="if(event.key==='Enter'){event.preventDefault();searchADUser();}">
        <button class="btn btn-secondary btn-sm" type="button" onclick="searchADUser()">Suchen</button>

    <div class="form-row" id="us_super_row"><label><input type="checkbox" id="us_super" ${u.superadmin?'checked':''} style="width:auto;margin-right:6px"> Superadmin (volle Rechte – nur DLS &amp; Immo)</label></div>
    <div class="form-row"><label><input type="checkbox" id="us_aktiv" ${u.aktiv!==false?'checked':''} style="width:auto;margin-right:6px"> Aktiv (darf sich anmelden)</label></div>`;

let adResults=[];
function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=v||''; }
async function searchADUser(){
  const q=(document.getElementById('us_adsearch')?.value||'').trim();
  const box=document.getElementById('us_adresults'); if(!box) return;
  if(q.length<2){ box.innerHTML='<div class="ad-hint">Bitte mind. 2 Zeichen eingeben.</div>'; return; }
  box.innerHTML='<div class="ad-hint">Suche im BCW-Verzeichnis…</div>';
  try{
    const users=await api('/ad/search?q='+encodeURIComponent(q));
    adResults=users||[];
    if(!adResults.length){ box.innerHTML='<div class="ad-hint">Kein Treffer im Verzeichnis.</div>'; return; }
    box.innerHTML=adResults.map((u,i)=>`<button type="button" class="ad-item" onclick="selectADUser(${i})">
      <span><b>${esc(u.displayName||u.sAMAccountName)}</b> <span style="color:var(--gray-400)">${esc(u.sAMAccountName)}</span></span>
      <span style="color:var(--gray-400);font-size:12px">${esc(u.department||'')}</span>
    </button>`).join('');
  }catch(e){ box.innerHTML='<div class="ad-hint" style="color:#d33">'+esc(e.message)+'</div>'; }
}
function selectADUser(i){
  const d=adResults[i]; if(!d) return;
  setVal('us_vorname',d.givenName); setVal('us_nachname',d.sn);
  setVal('us_email',d.mail); setVal('us_abteilung',d.department); setVal('us_aduser',d.sAMAccountName);
  const box=document.getElementById('us_adresults');
  if(box) box.innerHTML='<div class="ad-hint" style="color:#1a8a4a">✓ Übernommen: '+esc(d.displayName||((d.givenName||'')+' '+(d.sn||'')))+'</div>';
}
function syncSuperToggle(){
  const team=document.getElementById('us_team')?.value;
  const allowed=TEAMS[team]?.superAllowed;
  const row=document.getElementById('us_super_row'), cb=document.getElementById('us_super');
  if(!row||!cb) return;
  cb.disabled=!allowed; if(!allowed) cb.checked=false;
  row.style.opacity=allowed?'1':'.45';
}
async function saveUser(id){
  const payload={
    vorname:val('us_vorname'), nachname:val('us_nachname'),
    team:document.getElementById('us_team').value,
    email:val('us_email'), abteilung:val('us_abteilung'), adUser:val('us_aduser'),
    superadmin:document.getElementById('us_super').checked,
    aktiv:document.getElementById('us_aktiv').checked
  };
  if(!payload.vorname||!payload.nachname){ toast('Vor- und Nachname erforderlich','error'); return; }
  try{
    if(id) await api('/users/'+id,{method:'PUT',body:JSON.stringify(payload)});
    else await api('/users',{method:'POST',body:JSON.stringify(payload)});
    await loadState(); closeModal(); applyUser(); buildNav();
    renderAdmin(document.getElementById('content'),document.getElementById('topbarActions'));
    toast('Gespeichert','success');
  }catch(e){ toast(e.message,'error'); }
}
async function deleteUser(id){
  const u=State.users.find(x=>x.id===id); if(!u) return;
  if(id===Me.id){ toast('Du kannst dich nicht selbst löschen','error'); return; }
  if(!confirm(`Benutzer „${userFullName(u)}" löschen?`)) return;
  try{
    await api('/users/'+id,{method:'DELETE'});
    await loadState(); buildNav();
    renderAdmin(document.getElementById('content'),document.getElementById('topbarActions'));
    toast('Gelöscht','success');
  }catch(e){ toast(e.message,'error'); }
}

// ── Mangel melden (Standort-Melder) ─────────────────────────────────────────
function renderMelden(content, actions){
  actions.innerHTML='';
  const studios=State.studios.slice().sort((a,b)=>(a.standort||'').localeCompare(b.standort||'','de')||(a.name||'').localeCompare(b.name||'','de'));
  if(!studios.length){ content.innerHTML=emptyState('Es sind noch keine Studios hinterlegt. Bitte an das DLS-/Immo-Team wenden.'); return; }
  content.innerHTML = `
    <div class="card"><div class="card-body">
      <h2 style="color:var(--fom-primary);margin:0 0 4px">⚠️ Mangel melden</h2>
      <p style="color:var(--gray-600);margin:0 0 16px">Melde einen Mangel oder Bedarf an einem Studio. Das DLS-/Immo-Team kümmert sich um die Bearbeitung.</p>
      <div class="form-grid">
        <div class="form-row"><label>Studio *</label><select id="md_studio">${studios.map(s=>`<option value="${s.id}">${esc(s.standort?s.standort+' · ':'')}${esc(s.name)}</option>`).join('')}</select></div>
        <div class="form-row"><label>Kategorie</label><select id="md_kat">${INFRA_KATEGORIEN.map(k=>`<option>${k}</option>`).join('')}</select></div>
      </div>
      <div class="form-row"><label>Titel / Kurzbeschreibung *</label><input id="md_titel" placeholder="z.B. Klimagerät tropft"></div>
      <div class="form-row"><label>Beschreibung</label><textarea id="md_desc" placeholder="Was genau ist das Problem? Wo befindet es sich?"></textarea></div>
      <div class="form-row"><label>Foto (optional)</label><input type="file" id="md_foto" accept="image/*" capture="environment"></div>
      <button class="btn btn-primary" onclick="submitMeldung()">Mangel melden</button>
    </div></div>`;
}
async function submitMeldung(){
  if(!requireUser()) return;
  const studioId=document.getElementById('md_studio').value;
  const titel=val('md_titel');
  if(!titel){ toast('Bitte einen Titel angeben','error'); return; }
  const payload={
    studioId, titel, kategorie:document.getElementById('md_kat').value,
    beschreibung:val('md_desc'),
    status:'handlungsbedarf', bearbeitungsstatus:'offen',
    melderId:Me.id, erstelltVon:Me.team+' – '+Me.name
  };
  try{
    const created=await api('/infrastruktur',{method:'POST',body:JSON.stringify(payload)});
    const file=document.getElementById('md_foto')?.files?.[0];
    if(file){
      try{ const dataUrl=await resizeImage(file,1600,0.82);
        await api('/infrastruktur/'+created.id+'/fotos',{method:'POST',body:JSON.stringify({dataUrl,hochgeladenVon:Me.team+' – '+Me.name})});
      }catch(e){ toast('Mangel gespeichert, Foto fehlgeschlagen','error'); }
    }
    await loadState(); toast('Danke! Mangel gemeldet','success'); navigate('meine');
  }catch(e){ toast(e.message,'error'); }
}

  const meine=State.infrastruktur.filter(i=>i.melderId===Me.id).sort((a,b)=>new Date(b.erstelltAm)-new Date(a.erstelltAm));
  if(!meine.length){ content.innerHTML=emptyState('Du hast noch nichts gemeldet. Lege oben eine neue Meldung an.'); return; }

// ════════════════════════════════════════════════════════════════════════════
//  VORGÄNGE (Kaskaden) – mehrstufige Abläufe mit Schritten & Rückfragen
// ════════════════════════════════════════════════════════════════════════════
const VORGANG_STATUS_META = {
  offen:{label:'Offen',badge:'badge-gray'},
  laufend:{label:'Laufend',badge:'badge-blue'},
  wartet:{label:'Wartet auf Rückmeldung',badge:'badge-yellow'},
  abgeschlossen:{label:'Abgeschlossen',badge:'badge-green'},
  abgebrochen:{label:'Abgebrochen',badge:'badge-red'}
};
const SCHRITT_STATUS_META = {
  offen:{label:'Offen',badge:'badge-gray',icon:'⚪'},
  aktiv:{label:'Aktiv',badge:'badge-blue',icon:'🔵'},
  erledigt:{label:'Erledigt',badge:'badge-green',icon:'✅'},
  uebersprungen:{label:'Übersprungen',badge:'badge-gray',icon:'⏭️'}
};
const SCHRITT_CYCLE = ['offen','aktiv','erledigt'];
// Vorlagen-Kaskaden (selbst editierbar nach dem Anlegen).
const VORGANG_VORLAGEN = {
  klima:{ label:'❄️ Klimageräte-Beschaffung', kategorie:'Beschaffung', schritte:[
    'Bedarf erfassen & Studio prüfen','Geräte/Angebot auswählen','Bestellung freigeben (Budget)',
    'Bestellung ausgelöst','Lieferung erhalten','Montage/Installation terminiert',
    'Installation durchgeführt','Funktionsprüfung & Abnahme'
  ]},
  beschaffung:{ label:'📦 Allgemeine Beschaffung', kategorie:'Beschaffung', schritte:[
    'Bedarf klären','Angebot einholen','Freigabe einholen','Bestellen','Wareneingang','Abschluss & Dokumentation'
  ]},
  wartung:{ label:'🔧 Wartung / Reparatur', kategorie:'Wartung', schritte:[
    'Problem aufnehmen','Dienstleister beauftragen','Termin vereinbaren','Durchführung','Abnahme'
  ]},
  leer:{ label:'🔄 Leerer Vorgang', kategorie:'', schritte:[] }
};

let vorgangFilter='aktiv';

function vorgangProgress(v){
  const list=v.schritte||[];
  const total=list.length;
  const done=list.filter(s=>s.status==='erledigt'||s.status==='uebersprungen').length;
  return { total, done, pct: total?Math.round(done/total*100):0 };
}
function vorgangIstAktiv(v){ return v.status!=='abgeschlossen' && v.status!=='abgebrochen'; }

function renderVorgaenge(content, actions){
  if(State.currentVorgang){ renderVorgangDetail(content, actions); return; }
  actions.innerHTML = `<button class="btn btn-primary" onclick="openVorgangModal()">+ Vorgang</button>`;
  const all=State.vorgaenge||[];
  const offeneFragen = all.reduce((n,v)=>n+(v.fragen||[]).filter(f=>!f.antwort).length,0);
  let list = all.filter(v=> vorgangFilter==='alle' ? true : vorgangFilter==='abgeschlossen' ? !vorgangIstAktiv(v) : vorgangIstAktiv(v));
  list.sort((a,b)=> new Date(b.geaendertAm||b.erstelltAm)-new Date(a.geaendertAm||a.erstelltAm));
  const chip=(f,label,n)=>`<button class="btn ${vorgangFilter===f?'btn-primary':'btn-secondary'} btn-sm" onclick="setVorgangFilter('${f}')">${label}${n!=null?' ('+n+')':''}</button>`;
  const aktivN=all.filter(vorgangIstAktiv).length, abgeschlN=all.length-aktivN;
  content.innerHTML = `
    <div class="card"><div class="card-body">
      <p style="color:var(--gray-600);margin:0 0 10px">Vorgänge bündeln mehrstufige Abläufe als <b>Kaskade</b> – z. B. eine Klimageräte-Beschaffung von der Bedarfserfassung bis zur Abnahme. Jeder Schritt ist selbst aktualisierbar, und es können <b>Rückfragen</b> gestellt werden.</p>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${chip('aktiv','Aktiv',aktivN)} ${chip('abgeschlossen','Abgeschlossen',abgeschlN)} ${chip('alle','Alle',all.length)}
      ${offeneFragen?`<span class="badge badge-yellow" style="align-self:center">❓ ${offeneFragen} offene Frage(n)</span>`:''}</div>
    </div></div>
    <div class="studio-grid">${list.length? list.map(vorgangCard).join('') : emptyState('Keine Vorgänge – oben mit „+ Vorgang" anlegen')}</div>`;
}
function setVorgangFilter(f){ vorgangFilter=f; renderVorgaenge(document.getElementById('content'), document.getElementById('topbarActions')); }

function vorgangStudioName(v){
  if(v.studioId===STUDIO_ALL) return '🏢 Alle Studios';
  const s=v.studioId?studioById(v.studioId):null;
  return s?((s.standort?s.standort+' · ':'')+s.name):'';
}
function vorgangCard(v){
  const p=vorgangProgress(v);
  const st=VORGANG_STATUS_META[v.status]||VORGANG_STATUS_META.offen;
  const sName=vorgangStudioName(v);
  const offeneFragen=(v.fragen||[]).filter(f=>!f.antwort).length;
  return `<div class="studio-card" style="cursor:pointer;border-left-color:var(--fom-primary)" onclick="openVorgang('${v.id}')">
    <div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
      <h3 style="margin:0">${esc(v.titel)}</h3>
      <span class="badge ${st.badge}">${st.label}</span>
    </div>
    ${v.kategorie?`<div style="font-size:12px;color:var(--gray-600);margin-top:2px">${esc(v.kategorie)}${sName?' · '+esc(sName):''}</div>`:sName?`<div style="font-size:12px;color:var(--gray-600);margin-top:2px">${esc(sName)}</div>`:''}
    <div style="margin-top:10px">
      <div style="height:8px;background:var(--gray-200);border-radius:6px;overflow:hidden"><div style="height:100%;width:${p.pct}%;background:var(--fom-primary)"></div></div>
      <div style="font-size:12px;color:var(--gray-600);margin-top:4px">${p.done}/${p.total} Schritte · ${p.pct}%${offeneFragen?` · <span style="color:#9a6700">❓ ${offeneFragen} Frage(n)</span>`:''}</div>
    </div>
  </div>`;
}

function openVorgang(id){ State.currentVorgang=id; navigate('vorgaenge'); }
function backToVorgaenge(){ State.currentVorgang=null; navigate('vorgaenge'); }
function refreshVorgang(){ renderVorgaenge(document.getElementById('content'), document.getElementById('topbarActions')); }

function renderVorgangDetail(content, actions){
  const v=State.vorgaenge.find(x=>x.id===State.currentVorgang);
  if(!v){ State.currentVorgang=null; renderVorgaenge(content, actions); return; }
  actions.innerHTML = `<button class="btn btn-secondary" onclick="backToVorgaenge()">← Zurück</button><button class="btn btn-secondary" onclick="openVorgangModal('${v.id}')">⚙️ Bearbeiten</button>`;
  const p=vorgangProgress(v);
  const st=VORGANG_STATUS_META[v.status]||VORGANG_STATUS_META.offen;
  const sName=vorgangStudioName(v);
  const schritte=v.schritte||[];
  const fragen=(v.fragen||[]).slice().sort((a,b)=>new Date(a.erstelltAm)-new Date(b.erstelltAm));

  const statusSel = Object.entries(VORGANG_STATUS_META).map(([k,m])=>`<option value="${k}"${v.status===k?' selected':''}>${m.label}</option>`).join('');

  const stepRows = schritte.length ? schritte.map((sch,idx)=>{
    const m=SCHRITT_STATUS_META[sch.status]||SCHRITT_STATUS_META.offen;
    const over = sch.faelligBis && sch.status!=='erledigt' && sch.status!=='uebersprungen' && new Date(sch.faelligBis+'T23:59:59')<new Date();
    return `<div class="vg-step ${sch.status==='erledigt'||sch.status==='uebersprungen'?'done':''}">
      <div class="vg-step-num">${idx+1}</div>
      <button class="btn-ghost" title="Status weiterschalten" style="font-size:18px;flex:0 0 auto" onclick="cycleSchritt('${v.id}','${sch.id}')">${m.icon}</button>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;${sch.status==='erledigt'?'text-decoration:line-through':''}">${esc(sch.titel)}</div>
        ${sch.notiz?`<div class="infra-desc" style="margin-top:2px">${esc(sch.notiz)}</div>`:''}
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:5px">
          <span class="badge ${m.badge}">${m.label}</span>
          ${sch.zustaendig?`<span class="badge badge-gray">👤 ${esc(sch.zustaendig)}</span>`:''}
          ${sch.faelligBis?`<span class="badge ${over?'badge-red':'badge-gray'}">📅 ${fmtD(sch.faelligBis)}${over?' · überfällig':''}</span>`:''}
          ${sch.erledigtAm?`<span class="badge badge-green">✓ ${fmtD(sch.erledigtAm)}</span>`:''}
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:0;flex:0 0 auto">
        <button class="btn-ghost" title="Nach oben" onclick="moveSchritt('${v.id}','${sch.id}',-1)" ${idx===0?'disabled style=\"opacity:.3\"':''}>▲</button>
        <button class="btn-ghost" title="Nach unten" onclick="moveSchritt('${v.id}','${sch.id}',1)" ${idx===schritte.length-1?'disabled style=\"opacity:.3\"':''}>▼</button>
      </div>
      <div style="display:flex;gap:2px;flex:0 0 auto">
        <button class="btn-ghost" title="Bearbeiten" onclick="openSchrittModal('${v.id}','${sch.id}')">✏️</button>
        <button class="btn-ghost" title="Löschen" onclick="deleteSchritt('${v.id}','${sch.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('') : `<div class="empty-state" style="padding:20px">Noch keine Schritte – füge unten den ersten Schritt der Kaskade hinzu.</div>`;

  const frageRows = fragen.length ? fragen.map(f=>`
    <div class="vg-frage ${f.antwort?'':'offen'}">
      <div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap">
        <b>❓ ${esc(f.text)}</b>
        <button class="btn-ghost" title="Löschen" onclick="deleteFrage('${v.id}','${f.id}')">🗑️</button>
      </div>
      <div style="font-size:11.5px;color:var(--gray-400);margin-top:2px">${esc(f.autor||'—')}${f.team?' · '+esc(f.team):''} · ${fmtDT(f.erstelltAm)}</div>
      ${f.antwort
        ? `<div class="vg-antwort">💬 ${esc(f.antwort)}<div style="font-size:11.5px;color:var(--gray-400);margin-top:3px">${esc(f.beantwortetVon||'')} · ${fmtDT(f.beantwortetAm)}</div></div>`
        : `<div style="margin-top:8px;display:flex;gap:6px"><input id="ans_${f.id}" placeholder="Antwort…" style="flex:1"><button class="btn btn-primary btn-sm" onclick="answerFrage('${v.id}','${f.id}')">Antworten</button></div>`}
    </div>`).join('') : `<div class="empty-state" style="padding:16px">Noch keine Rückfragen</div>`;

  content.innerHTML = `
    <div class="card"><div class="card-body">
      <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start">
        <div style="flex:1;min-width:220px">
          <h2 style="color:var(--fom-primary);margin:0">${esc(v.titel)}</h2>
          ${v.beschreibung?`<p style="margin:6px 0 0;color:var(--gray-600)">${esc(v.beschreibung)}</p>`:''}
          <div style="font-size:12.5px;color:var(--gray-600);margin-top:6px">${v.kategorie?esc(v.kategorie):'Vorgang'}${sName?' · '+esc(sName):''} · erstellt ${fmtD(v.erstelltAm)}</div>
        </div>
        <div style="text-align:right">
          <label style="font-size:11.5px;color:var(--gray-400);font-weight:600;display:block;margin-bottom:4px">STATUS</label>
          <select onchange="setVorgangStatus('${v.id}',this.value)" style="min-width:200px">${statusSel}</select>
        </div>
      </div>
      <div style="margin-top:14px;max-width:520px">
        <div style="height:10px;background:var(--gray-200);border-radius:6px;overflow:hidden"><div style="height:100%;width:${p.pct}%;background:var(--fom-primary)"></div></div>
        <div style="font-size:12.5px;color:var(--gray-600);margin-top:5px">${p.done} von ${p.total} Schritten erledigt (${p.pct}%)</div>
      </div>
    </div></div>

    <div class="card"><div class="card-header"><div class="card-title">🪜 Kaskade – Schritte</div><button class="btn btn-primary btn-sm" onclick="openSchrittModal('${v.id}')">+ Schritt</button></div>
      <div class="card-body"><div class="vg-steps">${stepRows}</div></div>
    </div>

    <div class="card"><div class="card-header"><div class="card-title">❓ Rückfragen</div></div>
      <div class="card-body">
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <input id="vg_neue_frage" placeholder="Frage zum Vorgang stellen…" style="flex:1" onkeydown="if(event.key==='Enter')addFrage('${v.id}')">
          <button class="btn btn-primary" onclick="addFrage('${v.id}')">Fragen</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:10px">${frageRows}</div>
      </div>
    </div>`;
}

// ── Vorgang anlegen/bearbeiten ───────────────────────────────────────────────
function openVorgangModal(id){
  const v = id ? State.vorgaenge.find(x=>x.id===id) : {};
  const edit=!!id;
  const studioOpts = State.studios.slice().sort((a,b)=>(a.standort||'').localeCompare(b.standort||'','de'))
    .map(s=>`<option value="${s.id}"${v.studioId===s.id?' selected':''}>${esc(s.standort?s.standort+' · ':'')}${esc(s.name)}</option>`).join('');
  const vorlagenOpts = Object.entries(VORGANG_VORLAGEN).map(([k,vl])=>`<option value="${k}">${esc(vl.label)}</option>`).join('');
  const body=`
    <div class="form-row"><label>Titel *</label><input id="vg_titel" value="${esc(v.titel||'')}" placeholder="z.B. Klimageräte für Studio AC/PUS1 bestellen"></div>
    <div class="form-row"><label>Beschreibung</label><textarea id="vg_desc">${esc(v.beschreibung||'')}</textarea></div>
    <div class="form-grid">
      <div class="form-row"><label>Kategorie</label><input id="vg_kat" value="${esc(v.kategorie||'')}" placeholder="z.B. Beschaffung"></div>
      <div class="form-row"><label>Studio (optional)</label><select id="vg_studio"><option value="">— keins —</option><option value="${STUDIO_ALL}"${v.studioId===STUDIO_ALL?' selected':''}>🏢 Alle Studios</option>${studioOpts}</select></div>
    </div>
    ${edit?'':`<div class="form-row"><label>Vorlage (Kaskade)</label><select id="vg_vorlage" onchange="syncVorlageKat()">${vorlagenOpts}</select><span style="font-size:12px;color:var(--gray-400)">Die Schritte werden vorbefüllt und sind danach frei editierbar.</span></div>`}`;
  openModal(edit?'Vorgang bearbeiten':'Neuer Vorgang', body, [
    {label:'Abbrechen',cls:'btn-secondary',fn:closeModal},
    {label:edit?'Speichern':'Anlegen',cls:'btn-primary',fn:()=>saveVorgang(id)}
  ]);
}
function syncVorlageKat(){
  const k=document.getElementById('vg_vorlage')?.value; const vl=VORGANG_VORLAGEN[k];
  const kat=document.getElementById('vg_kat');
  if(vl && kat && !kat.value) kat.value=vl.kategorie;
}
async function saveVorgang(id){
  const payload={
    titel:val('vg_titel'), beschreibung:val('vg_desc'), kategorie:val('vg_kat'),
    studioId:document.getElementById('vg_studio').value||''
  };
  if(!payload.titel){ toast('Titel ist erforderlich','error'); return; }
  try{
    if(id){
      await api('/vorgaenge/'+id,{method:'PUT',body:JSON.stringify(payload)});
    } else {
      payload.status='offen';
      const created=await api('/vorgaenge',{method:'POST',body:JSON.stringify(payload)});
      const vlKey=document.getElementById('vg_vorlage')?.value;
      const vl=VORGANG_VORLAGEN[vlKey];
      if(vl && vl.schritte.length){
        for(const titel of vl.schritte){
          await api('/vorgaenge/'+created.id+'/schritte',{method:'POST',body:JSON.stringify({titel})});
        }
      }
      State.currentVorgang=created.id;
    }
    await loadState(); closeModal(); buildNav();
    navigate('vorgaenge'); toast('Gespeichert','success');
  }catch(e){ toast(e.message,'error'); }
}
async function setVorgangStatus(id,status){
  try{ await api('/vorgaenge/'+id,{method:'PUT',body:JSON.stringify({status})}); await loadState(); refreshVorgang(); }
  catch(e){ toast(e.message,'error'); }
}

// ── Schritte (Kaskade) ───────────────────────────────────────────────────────
function openSchrittModal(vid, sid){
  const v=State.vorgaenge.find(x=>x.id===vid); if(!v) return;
  const sch = sid ? (v.schritte||[]).find(x=>x.id===sid)||{} : {};
  const edit=!!sid;
  const statusSel=Object.entries(SCHRITT_STATUS_META).map(([k,m])=>`<option value="${k}"${(sch.status||'offen')===k?' selected':''}>${m.label}</option>`).join('');
  const body=`
    <div class="form-row"><label>Schritt *</label><input id="sc_titel" value="${esc(sch.titel||'')}" placeholder="z.B. Bestellung freigeben"></div>
    <div class="form-row"><label>Notiz</label><textarea id="sc_notiz">${esc(sch.notiz||'')}</textarea></div>
    <div class="form-grid">
      <div class="form-row"><label>Status</label><select id="sc_status">${statusSel}</select></div>
      <div class="form-row"><label>Zuständig</label><input id="sc_zust" value="${esc(sch.zustaendig||'')}" placeholder="Name / Team"></div>
    </div>
    <div class="form-row"><label>Fällig bis</label><input type="date" id="sc_faellig" value="${esc(sch.faelligBis||'')}"></div>`;
  openModal(edit?'Schritt bearbeiten':'Neuer Schritt', body, [
    {label:'Abbrechen',cls:'btn-secondary',fn:closeModal},
    {label:edit?'Speichern':'Hinzufügen',cls:'btn-primary',fn:()=>saveSchritt(vid,sid)}
  ]);
}
async function saveSchritt(vid,sid){
  const payload={ titel:val('sc_titel'), notiz:val('sc_notiz'),
    status:document.getElementById('sc_status').value, zustaendig:val('sc_zust'), faelligBis:val('sc_faellig') };
  if(!payload.titel){ toast('Titel ist erforderlich','error'); return; }
  try{
    if(sid) await api('/vorgaenge/'+vid+'/schritte/'+sid,{method:'PUT',body:JSON.stringify(payload)});
    else await api('/vorgaenge/'+vid+'/schritte',{method:'POST',body:JSON.stringify(payload)});
    await loadState(); closeModal(); refreshVorgang(); toast('Gespeichert','success');
  }catch(e){ toast(e.message,'error'); }
}
async function cycleSchritt(vid,sid){
  const v=State.vorgaenge.find(x=>x.id===vid); const sch=(v.schritte||[]).find(x=>x.id===sid); if(!sch) return;
  const cur=SCHRITT_CYCLE.indexOf(sch.status);
  const next=SCHRITT_CYCLE[(cur+1)%SCHRITT_CYCLE.length] || 'offen';
  try{ await api('/vorgaenge/'+vid+'/schritte/'+sid,{method:'PUT',body:JSON.stringify({status:next})}); await loadState(); refreshVorgang(); }
  catch(e){ toast(e.message,'error'); }
}
async function moveSchritt(vid,sid,dir){
  const v=State.vorgaenge.find(x=>x.id===vid); const list=(v.schritte||[]).map(s=>s.id);
  const i=list.indexOf(sid); const j=i+dir;
  if(i<0||j<0||j>=list.length) return;
  list.splice(j,0,list.splice(i,1)[0]);
  try{ await api('/vorgaenge/'+vid+'/schritte-sortieren',{method:'PUT',body:JSON.stringify({reihenfolge:list})}); await loadState(); refreshVorgang(); }
  catch(e){ toast(e.message,'error'); }
}
async function deleteSchritt(vid,sid){
  if(!confirm('Schritt löschen?')) return;
  try{ await api('/vorgaenge/'+vid+'/schritte/'+sid,{method:'DELETE'}); await loadState(); refreshVorgang(); toast('Gelöscht','success'); }
  catch(e){ toast(e.message,'error'); }
}

// ── Rückfragen ───────────────────────────────────────────────────────────────
async function addFrage(vid){
  const inp=document.getElementById('vg_neue_frage'); const text=(inp?.value||'').trim();
  if(!text){ toast('Bitte eine Frage eingeben','error'); return; }
  try{ await api('/vorgaenge/'+vid+'/fragen',{method:'POST',body:JSON.stringify({text,autor:Me.name,team:Me.team})}); await loadState(); refreshVorgang(); }
  catch(e){ toast(e.message,'error'); }
}
async function answerFrage(vid,fid){
  const inp=document.getElementById('ans_'+fid); const antwort=(inp?.value||'').trim();
  if(!antwort){ toast('Bitte eine Antwort eingeben','error'); return; }
  try{ await api('/vorgaenge/'+vid+'/fragen/'+fid,{method:'PUT',body:JSON.stringify({antwort,beantwortetVon:Me.team+' – '+Me.name})}); await loadState(); refreshVorgang(); }
  catch(e){ toast(e.message,'error'); }
}
async function deleteFrage(vid,fid){
  if(!confirm('Frage löschen?')) return;
  try{ await api('/vorgaenge/'+vid+'/fragen/'+fid,{method:'DELETE'}); await loadState(); refreshVorgang(); }
  catch(e){ toast(e.message,'error'); }
}

// Utils
function studioById(id){ return State.studios.find(s=>s.id===id); }
function val(id){ return (document.getElementById(id)?.value||'').trim(); }
function emptyState(msg){ return `<div class="empty-state"><div class="eicon">📭</div>${esc(msg)}</div>`; }

// ════════════════════════════════════════════════════════════════════════════
//  FOTOS
// ════════════════════════════════════════════════════════════════════════════
function pickStudioFoto(studioId){
  if(!requireUser()) return;
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*'; inp.setAttribute('capture','environment');
  inp.onchange=async()=>{
    const file=inp.files&&inp.files[0]; if(!file) return;
    try{
      toast('Foto wird verarbeitet…');
      const dataUrl=await resizeImage(file,1600,0.82);
      const raum=(prompt('Welcher Raum / Bereich? (optional)','')||'').trim();
      await api('/studios/'+studioId+'/fotos',{method:'POST',body:JSON.stringify({dataUrl,raum,hochgeladenVon:Me.team+' – '+Me.name})});
      await loadState(); toast('Foto gespeichert','success'); openStudio(studioId);
    }catch(e){ toast(e.message||'Upload fehlgeschlagen','error'); }
  };
  inp.click();
}
function resizeImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    if(!/^image\//.test(file.type)){ reject(new Error('Bitte ein Bild auswählen')); return; }
    const url=URL.createObjectURL(file); const img=new Image();
    img.onload=()=>{ URL.revokeObjectURL(url);
      let w=img.naturalWidth, h=img.naturalHeight;
      if(w>h && w>maxDim){ h=Math.round(h*maxDim/w); w=maxDim; }
      else if(h>=w && h>maxDim){ w=Math.round(w*maxDim/h); h=maxDim; }
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      resolve(c.toDataURL('image/jpeg',quality));
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); reject(new Error('Bild konnte nicht gelesen werden')); };
    img.src=url;
  });
}
async function deleteFoto(studioId,fotoId){
  if(!confirm('Dieses Foto löschen?')) return;
  try{ await api('/studios/'+studioId+'/fotos/'+fotoId,{method:'DELETE'}); await loadState(); toast('Foto gelöscht','success'); openStudio(studioId); }
  catch(e){ toast(e.message,'error'); }
}
function openLightbox(src,cap){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightboxCap').textContent=cap||'';
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){ const lb=document.getElementById('lightbox'); lb.classList.remove('open'); document.getElementById('lightboxImg').src=''; }

//  EXPORT (Mängelbericht Excel / PDF)
// ════════════════════════════════════════════════════════════════════════════
function openExportModal(){
  const cities=[...new Set(State.studios.map(s=>s.standort).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'de'));
  const body=`
    <div class="form-row"><label>Standort</label><select id="ex_standort"><option value="">Alle Standorte</option>${cities.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('')}</select></div>
    <p style="font-size:12.5px;color:var(--gray-400)">Erzeugt einen Mängelbericht mit Status, Bearbeitung, Zuständigkeit, Bedarf und Anzahl Fotos/Kommentaren.</p>
    <div style="display:flex;gap:10px;margin-top:8px">
      <button class="btn btn-primary" style="flex:1" onclick="exportFromModal('excel')">📊 Als Excel</button>
      <button class="btn btn-secondary" style="flex:1" onclick="exportFromModal('pdf')">📄 Als PDF</button>
    </div>`;
  openModal('⬇️ Mängelbericht exportieren', body, [{label:'Schließen',cls:'btn-secondary',fn:closeModal}]);
}
function exportFromModal(fmt){
  const standort=document.getElementById('ex_standort').value;
  exportReport(fmt, encodeURIComponent(standort));
}
function exportReport(fmt, standortEnc){
  const url='/api/export/'+(fmt==='pdf'?'pdf':'excel')+'?standort='+(standortEnc||'');
  window.open(url,'_blank');
  toast('Export wird erstellt…','success');
}

// ════════════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════════════
async function init(){
  try{ await loadState(); }catch(e){ toast('Server nicht erreichbar','error'); }
  applyUser();
  buildNav();
  if(!isLoggedIn()){ openLoginModal(); }
  else { navigate(defaultRoute()); }
}
init();
</script>
